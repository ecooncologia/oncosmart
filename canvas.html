<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Artes - ONCO SMART</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;600&family=Lato:wght@300;400;700&family=Playfair+Display:ital,wght@0,400;0,700&family=Dancing+Script:wght@400;700&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <style>
        body { overflow: hidden; background: #f0f2f5; }
        .container { height: 100vh; display: flex; flex-direction: column; }
        #global-header, #global-nav { flex-shrink: 0; z-index: 1000; }

        .editor-workspace { display: flex; flex: 1; overflow: hidden; background: #e9ebee; position: relative; }
        .editor-sidebar { width: 300px; background: white; border-right: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; }
        .editor-panel { width: 320px; background: white; border-left: 1px solid #ddd; display: flex; flex-direction: column; z-index: 10; overflow-y: auto; }
        .editor-main { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        .canvas-scroll-area { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; padding: 40px; background-image: radial-gradient(#ccc 1px, transparent 1px); background-size: 20px 20px; }
        .canvas-wrapper { background: white; box-shadow: 0 10px 40px rgba(0,0,0,0.15); position: relative; transform-origin: top left; }

        .canvas-layer { position: absolute; cursor: pointer; box-sizing: border-box; line-height: 1.2; user-select: none; border: 1px solid transparent; }
        .canvas-layer:hover { border: 1px dashed var(--primary); }
        .canvas-layer.selected { border: 2px solid var(--primary); z-index: 100 !important; }
        .canvas-image { width: 100%; height: 100%; object-fit: fill; pointer-events: none; position: absolute; inset: 0; }
        .text-content { width: 100%; height: 100%; word-wrap: break-word; white-space: pre-wrap; display: flex; flex-direction: column; justify-content: center; }

        .panel-header { padding: 15px; font-weight: 700; color: var(--secondary); border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 14px; background: #f8f9fa; }
        .panel-body { padding: 15px; }
        
        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .template-card { background: #eee; border-radius: 6px; overflow: hidden; cursor: pointer; border: 2px solid transparent; height: 100px; position: relative; }
        .template-card:hover { border-color: var(--primary); }
        .template-preview { height: 100%; background-size: cover; background-position: center; }
        .template-info { position: absolute; bottom: 0; background: rgba(255,255,255,0.9); width: 100%; font-size: 10px; padding: 2px; text-align: center; font-weight: bold; }

        .toolbar { height: 60px; background: white; border-bottom: 1px solid #ddd; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .prop-group { margin-bottom: 15px; }
        .prop-label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 6px; text-transform: uppercase; }
        .prop-control { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 13px; outline: none; }
        .prop-control:focus { border-color: var(--primary); }

        .magic-btn-group { display: flex; gap: 5px; margin-top: 10px; }
        .magic-btn { flex: 1; background: #f0f2f5; color: #333; border: 1px solid #ddd; font-size: 12px; padding: 10px; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; font-weight: 600; transition: 0.2s; }
        .magic-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div id="global-header" class="header"></div>
        <div id="global-nav"></div>

        <div class="editor-workspace">
            <div class="editor-sidebar">
                <div class="panel-header"><span><i class="fas fa-layer-group"></i> Modelos da Clínica</span></div>
                <div class="panel-body"><div class="template-grid" id="templateList"></div></div>
            </div>

            <div class="editor-main">
                <div class="toolbar">
                    <span style="font-weight: 600; color: #4A5568;"><i class="fas fa-paint-brush"></i> Personalize a Arte</span>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-sm btn-primary" onclick="downloadCard()"><i class="fas fa-download"></i> Baixar Imagem</button>
                        <button class="btn btn-sm btn-success" onclick="salvarRascunhoLocal(false)"><i class="fas fa-save"></i> Salvar Progresso</button>
                    </div>
                </div>

                <div class="canvas-scroll-area" id="scrollArea">
                    <div class="canvas-wrapper" id="canvasWrapper" style="width: 800px; height: 800px;">
                        <img id="bgImage" class="canvas-image" src="" style="display:none;">
                    </div>
                </div>
            </div>

            <div class="editor-panel">
                <div class="panel-header"><i class="fas fa-edit"></i> Edição de Texto</div>
                <div class="panel-body" id="propertiesContent">
                    <p style="text-align: center; color: #999; margin-top: 20px;">Selecione um texto na arte para personalizá-lo.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const state = { layers: [], selectedId: null, bgImage: null, canvasW: 800, canvasH: 800, currentGender: 'm', userEmail: '' };
        const els = { wrapper: document.getElementById('canvasWrapper'), bgImage: document.getElementById('bgImage'), props: document.getElementById('propertiesContent'), tplList: document.getElementById('templateList') };

        document.addEventListener('DOMContentLoaded', async () => {
            await initGlobal('canvas', 'Editor de Artes');
            const user = JSON.parse(localStorage.getItem('ecoUser'));
            if(user) state.userEmail = user.email;

            loadGlobalFonts();
            loadTemplates();
            loadLocalDraft(); // Carrega o rascunho 100% da memória local
        });

        // --- SISTEMA DE FONTES ---
        async function loadGlobalFonts() {
            try {
                const res = await fetch(`${API_BASE_URL}/fonts`, { headers: API_HEADERS });
                const data = await res.json();
                const fonts = normalizeCanvasData(data);
                
                Object.values(fonts).forEach(async (f) => {
                    try { 
                        const font = new FontFace(f.name, `url(${f.source})`); 
                        await font.load(); 
                        document.fonts.add(font); 
                    } catch(e) {}
                });
            } catch (e) { console.error("Erro fontes:", e); }
        }

        // --- SISTEMA DE RASCUNHO LOCAL (100% SEGURO) ---
        function salvarRascunhoLocal(silent = true) {
            if(!state.userEmail) return;
            const draft = { layers: state.layers, bgImage: state.bgImage, canvasW: state.canvasW, canvasH: state.canvasH };
            // Salva apenas no navegador. Não há risco de conflito com o banco de dados.
            localStorage.setItem('canvas_draft_' + state.userEmail, JSON.stringify(draft));
            if(!silent) alert("Progresso salvo com sucesso no seu navegador!");
        }

        let autoSaveTimer;
        function agendarAutoSave() {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => salvarRascunhoLocal(true), 1500);
        }

        function loadLocalDraft() {
            if(!state.userEmail) return;
            const draftStr = localStorage.getItem('canvas_draft_' + state.userEmail);
            if(draftStr) {
                try {
                    const draft = JSON.parse(draftStr);
                    state.layers = draft.layers || []; state.bgImage = draft.bgImage; state.canvasW = draft.canvasW; state.canvasH = draft.canvasH;
                    els.wrapper.style.width = state.canvasW + 'px'; els.wrapper.style.height = state.canvasH + 'px';
                    if(state.bgImage) { els.bgImage.src = state.bgImage; els.bgImage.style.display = 'block'; }
                    renderLayers();
                } catch(e) {}
            }
        }

        // --- RENDERIZAÇÃO E INTERAÇÃO ---
        function renderLayers() {
            document.querySelectorAll('.canvas-layer').forEach(e => e.remove());
            state.layers.forEach(layer => {
                const el = document.createElement('div'); el.className = 'canvas-layer'; el.id = layer.id;
                if(state.selectedId === layer.id) el.classList.add('selected');
                el.style.left = layer.x + 'px'; el.style.top = layer.y + 'px'; el.style.width = layer.w + 'px';
                
                const content = document.createElement('div'); content.className = 'text-content';
                content.innerText = layer.content; Object.assign(content.style, layer.style);
                content.style.fontSize = layer.style.fontSize + 'px';
                
                el.appendChild(content); els.wrapper.appendChild(el);
                
                if(layer.editable) {
                    el.addEventListener('mousedown', (e) => { e.stopPropagation(); selectLayer(layer.id); });
                } else {
                    el.style.cursor = 'default';
                }
            });
            agendarAutoSave();
        }

        function selectLayer(id) { state.selectedId = id; renderLayers(); renderProperties(); }

        function updateLayer(id, updates) {
            const layer = state.layers.find(l => l.id === id); if(!layer) return;
            Object.keys(updates).forEach(k => { layer[k] = updates[k]; });
            renderLayers();
        }

        function switchGender(id, gender) {
            const layer = state.layers.find(l => l.id === id); if(!layer) return;
            state.currentGender = gender;
            updateLayer(id, { content: gender === 'm' ? layer.textM : layer.textF });
            renderProperties();
        }

        function renderProperties() {
            const panel = els.props;
            const layer = state.layers.find(l => l.id === state.selectedId);
            
            if (!layer || !layer.editable) {
                panel.innerHTML = `<p style="text-align: center; color: #999; margin-top: 20px;">Clique em um texto da arte para personalizá-lo.</p>`;
                return;
            }

            panel.innerHTML = `
                <div class="prop-group">
                    <label class="prop-label">Gênero do Paciente:</label>
                    <div class="magic-btn-group">
                        <button class="magic-btn ${state.currentGender=='m'?'active':''}" onclick="switchGender('${layer.id}', 'm')"><i class="fas fa-mars"></i> Masculino</button>
                        <button class="magic-btn ${state.currentGender=='f'?'active':''}" onclick="switchGender('${layer.id}', 'f')"><i class="fas fa-venus"></i> Feminino</button>
                    </div>
                </div>
                <div class="prop-group">
                    <label class="prop-label">Digite o Texto:</label>
                    <textarea class="prop-control" rows="5" oninput="updateLayer('${layer.id}', {content: this.value})">${layer.content}</textarea>
                </div>
            `;
        }

        // --- BANCO DE DADOS (APENAS LEITURA DE TEMPLATES) ---
        async function loadTemplates() {
            try {
                const res = await fetch(`${API_BASE_URL}/templates`, { headers: API_HEADERS });
                if(!res.ok) return;
                const data = await res.json();
                
                els.tplList.innerHTML = '';
                Object.entries(data).forEach(([key, val]) => {
                    let obj = typeof val === 'string' ? JSON.parse(val) : val;
                    const div = document.createElement('div'); div.className = 'template-card';
                    const bg = obj.bgImage ? `url(${obj.bgImage})` : '#eee';
                    div.innerHTML = `<div class="template-preview" style="background-image:${bg}"></div><div class="template-info">${obj.name}</div>`;
                    div.onclick = () => loadTemplateData(obj);
                    els.tplList.appendChild(div);
                });
            } catch(e) {}
        }

        function loadTemplateData(data) {
            state.layers = data.layers || [];
            state.canvasW = data.canvasW || 800; state.canvasH = data.canvasH || 800;
            state.bgImage = data.bgImage || null;
            
            state.layers.forEach(l => { if(l.textM && state.currentGender === 'm') l.content = l.textM; if(l.textF && state.currentGender === 'f') l.content = l.textF; });
            
            els.wrapper.style.width = state.canvasW + 'px'; els.wrapper.style.height = state.canvasH + 'px';
            if(state.bgImage) { els.bgImage.src = state.bgImage; els.bgImage.style.display = 'block'; } else { els.bgImage.style.display = 'none'; }
            
            state.selectedId = null; renderLayers(); renderProperties();
        }

        // --- DOWNLOAD DA IMAGEM ---
        function downloadCard() {
            const btn = document.querySelector('button[onclick="downloadCard()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Aguarde...';
            
            setTimeout(() => {
                const canvas = document.createElement('canvas'); canvas.width = state.canvasW; canvas.height = state.canvasH; 
                const ctx = canvas.getContext('2d');
                
                const drawBg = new Promise(r => {
                    if (state.bgImage) {
                        const img = new Image(); img.crossOrigin="anonymous"; 
                        img.onload = () => { ctx.drawImage(img,0,0,state.canvasW,state.canvasH); r(); };
                        img.onerror = () => { ctx.fillStyle="white"; ctx.fillRect(0,0,state.canvasW,state.canvasH); r(); };
                        img.src = state.bgImage;
                    } else { ctx.fillStyle="white"; ctx.fillRect(0,0,state.canvasW,state.canvasH); r(); }
                });
                
                drawBg.then(() => {
                    state.layers.forEach(l => {
                        const s = l.style; ctx.font = `${s.fontWeight || 'normal'} ${s.fontSize}px "${s.fontFamily}"`;
                        ctx.fillStyle = s.color; ctx.textAlign = s.textAlign || 'left'; ctx.textBaseline = 'top';
                        let x = l.x; if(s.textAlign==='center') x+=l.w/2; if(s.textAlign==='right') x+=l.w;
                        wrapText(ctx, l.content, x, l.y, l.w, s.fontSize*1.2);
                    });
                    const link = document.createElement('a'); link.download = 'Arte_Eco_Oncologia.png'; 
                    link.href = canvas.toDataURL('image/png'); link.click(); 
                    btn.innerHTML = originalText;
                });
            }, 500);
        }
        
        function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
            text.split('\n').forEach(para => {
                let line = ''; para.split(' ').forEach(word => { const test = line + word + ' '; if (ctx.measureText(test).width > maxWidth && line !== '') { ctx.fillText(line, x, y); line = word + ' '; y += lineHeight; } else line = test; });
                ctx.fillText(line, x, y); y += lineHeight;
            });
        }

        function normalizeCanvasData(apiData) {
            if (!apiData) return {};
            const normalized = {};
            Object.entries(apiData).forEach(([key, val]) => {
                if (typeof val === 'string' && (val.startsWith('{') || val.startsWith('['))) {
                    try { normalized[key] = JSON.parse(val); } catch(e) { normalized[key] = val; }
                } else { normalized[key] = val; }
            });
            return normalized;
        }
    </script>
</body>
</html>
