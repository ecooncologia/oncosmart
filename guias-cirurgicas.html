<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Guias Cirúrgicas - ONCO SMART</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { width: 100%; padding: 20px; box-sizing: border-box; }
        
        .header-actions { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: white; padding: 15px 20px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .header-actions h2 { margin: 0; color: #00855B; display: flex; align-items: center; gap: 10px; }
        
        .btn-success { background: #00855B; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-success:hover { background: #006644; }
        
        .search-bar { padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; width: 300px; font-size: 14px; outline: none; }
        .search-bar:focus { border-color: #00855B; box-shadow: 0 0 0 2px rgba(0,133,91,0.2); }

        .sheet-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; }
        .table-responsive { overflow-x: auto; max-height: 70vh; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { background: #f8fafc; color: #475569; padding: 12px 15px; text-align: left; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid #e2e8f0; text-transform: uppercase; font-size: 11px; font-weight: 800; }
        .data-table td { padding: 12px 15px; border-bottom: 1px solid #f1f5f9; color: #334155; vertical-align: middle; }
        .data-table tr:hover { background-color: #f8fafc; }

        /* Status Badges baseados no seu rascunho */
        .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; display: inline-flex; align-items: center; gap: 5px;}
        .st-enviado { background: #e0f2fe; color: #0284c7; }
        .st-aguardando { background: #fef3c7; color: #d97706; }
        .st-recebido { background: #cffafe; color: #0369a1; }
        .st-pendente { background: #fee2e2; color: #dc2626; }
        .st-autorizado { background: #dcfce7; color: #166534; }
        .st-agendada { background: #f3e8ff; color: #7e22ce; }

        .action-btns { display: flex; gap: 8px; }
        .btn-icon { background: none; border: none; cursor: pointer; font-size: 15px; color: #94a3b8; transition: 0.2s; padding: 4px; }
        .btn-icon:hover { color: #0f172a; }
        .btn-icon.edit:hover { color: #0284c7; }
        .btn-icon.delete:hover { color: #dc2626; }

        /* Modal Styles */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 1000; opacity: 0; transition: opacity 0.3s; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: white; width: 90%; max-width: 800px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); display: flex; flex-direction: column; max-height: 90vh; }
        .modal-header { padding: 20px; border-bottom: 1px solid #e5e7eb; display: flex; justify-content: space-between; align-items: center; background: #00855B; color: white; border-radius: 12px 12px 0 0; }
        .modal-header h3 { margin: 0; font-size: 18px; }
        .close-modal { background: none; border: none; color: white; font-size: 20px; cursor: pointer; opacity: 0.8; transition: 0.2s; }
        .close-modal:hover { opacity: 1; }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #e5e7eb; display: flex; justify-content: flex-end; gap: 10px; background: #f8fafc; border-radius: 0 0 12px 12px; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group.full-width { grid-column: span 2; }
        .form-label { font-size: 12px; font-weight: 700; color: #475569; }
        .form-input { padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; color: #1e293b; outline: none; transition: border-color 0.2s; font-family: inherit;}
        .form-input:focus { border-color: #00855B; box-shadow: 0 0 0 3px rgba(0,133,91,0.1); }
        textarea.form-input { resize: vertical; min-height: 80px; }

        .btn-cancel { background: #e2e8f0; color: #475569; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-cancel:hover { background: #cbd5e1; }
    </style>
</head>
<body>
    <div class="container">
        <div id="global-header" class="header"></div>
        <div id="global-nav"></div>

        <div class="header-actions">
            <h2><i class="fas fa-notes-medical"></i> Controle de Guias Cirúrgicas</h2>
            <div style="display: flex; gap: 15px; align-items: center;">
                <input type="text" id="searchInput" class="search-bar" placeholder="Buscar paciente ou procedimento..." onkeyup="filterTable()">
                <button class="btn-success" onclick="openModal()">
                    <i class="fas fa-plus"></i> Nova Guia
                </button>
            </div>
        </div>

        <div class="sheet-container">
            <div class="table-responsive">
                <table class="data-table" id="guiasTable">
                    <thead>
                        <tr>
                            <th>Data Envio</th>
                            <th>Paciente</th>
                            <th>Procedimento</th>
                            <th>Convênio / Part.</th>
                            <th>Hospital</th>
                            <th>Status</th>
                            <th style="text-align: right;">Valor (R$)</th>
                            <th style="text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="8" style="text-align:center; padding: 30px; color: #94a3b8;"><i class="fas fa-spinner fa-spin"></i> Carregando guias...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="guiaModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">Cadastrar Nova Guia</h3>
                <button class="close-modal" onclick="closeModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <form id="guiaForm">
                    <input type="hidden" id="guia_id">
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label class="form-label">Data do Envio</label>
                            <input type="date" id="data_envio" class="form-input" required>
                        </div>
                        
                        <div class="form-group">
                            <label class="form-label">Status</label>
                            <select id="status" class="form-input" required>
                                <option value="Enviado">Enviado</option>
                                <option value="Aguardando confirmação">Aguardando confirmação</option>
                                <option value="Recebido pelo hospital">Recebido pelo hospital</option>
                                <option value="Pendente de documento">Pendente de documento</option>
                                <option value="Autorizado">Autorizado</option>
                                <option value="Cirurgia agendada">Cirurgia agendada</option>
                            </select>
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Paciente</label>
                            <input type="text" id="paciente" class="form-input" placeholder="Nome do paciente" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Médico Responsável</label>
                            <input type="text" id="medico" class="form-input" placeholder="Nome do médico" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Hospital</label>
                            <input type="text" id="hospital" class="form-input" placeholder="Ex: Hospital Vita" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Tipo (Convênio ou Particular)</label>
                            <input type="text" id="convenio" class="form-input" placeholder="Ex: Unimed, Bradesco, Particular..." required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Valor (R$)</label>
                            <input type="number" step="0.01" id="valor" class="form-input" placeholder="0,00">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Procedimento</label>
                            <input type="text" id="procedimento" class="form-input" placeholder="Descrição do procedimento cirúrgico" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Nº da Guia</label>
                            <input type="text" id="numero_guia" class="form-input" placeholder="Ex: 123456789">
                        </div>

                        <div class="form-group">
                            <label class="form-label">Forma de Envio</label>
                            <select id="forma_envio" class="form-input">
                                <option value="E-mail">E-mail</option>
                                <option value="Portal do Convênio">Portal do Convênio</option>
                                <option value="Físico / Malote">Físico / Malote</option>
                                <option value="WhatsApp">WhatsApp</option>
                            </select>
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Documentos Enviados</label>
                            <input type="text" id="documentos" class="form-input" placeholder="Ex: Pedido médico, exames, laudos...">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Responsável pelo Envio</label>
                            <input type="text" id="responsavel" class="form-input" placeholder="Quem fez a solicitação">
                        </div>

                        <div class="form-group full-width">
                            <label class="form-label">Observação</label>
                            <textarea id="observacao" class="form-input" placeholder="Anotações adicionais, pendências..."></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
                <button class="btn-success" onclick="saveGuia()"><i class="fas fa-save"></i> Salvar Guia</button>
            </div>
        </div>
    </div>

    <script>
        const API_TABLE = 'guias_cirurgicas';
        let guiasData = [];

        // Inicialização
        async function startApp() {
            if (typeof initGlobal !== 'undefined') {
                initGlobal('guias', 'Guias Cirúrgicas');
                await loadGuias();
                
                // Tenta preencher o responsável com o nome do usuário logado
                const userSession = localStorage.getItem('onco_user');
                if(userSession) {
                    try {
                        const u = JSON.parse(userSession);
                        document.getElementById('responsavel').value = u.nome || '';
                    } catch(e){}
                }
            } else {
                setTimeout(startApp, 100);
            }
        }
        document.addEventListener('DOMContentLoaded', startApp);

        // Busca dados na API
        async function loadGuias() {
            try {
                const res = await fetch(`${API_BASE_URL}/${API_TABLE}`, { headers: API_HEADERS });
                if (!res.ok) throw new Error('Falha ao carregar dados');
                
                const data = await res.json();
                
                // Normaliza o retorno JSON
                guiasData = Object.values(data).map(item => {
                    let obj = typeof item.dados_extras === 'string' ? JSON.parse(item.dados_extras) : (item.dados_extras || item);
                    obj.id_firebase = item.id_firebase || obj.id_firebase;
                    return obj;
                });
                
                // Ordena da mais recente para a mais antiga
                guiasData.sort((a, b) => new Date(b.data_envio || 0) - new Date(a.data_envio || 0));
                
                renderTable(guiasData);
            } catch (err) {
                console.error(err);
                document.querySelector('#guiasTable tbody').innerHTML = `<tr><td colspan="8" style="text-align:center; color:#dc2626;">Erro ao carregar dados. Verifique a conexão.</td></tr>`;
            }
        }

        // Renderiza a Tabela
        function renderTable(data) {
            const tbody = document.querySelector('#guiasTable tbody');
            if (data.length === 0) {
                tbody.innerHTML = `<tr><td colspan="8" style="text-align:center; padding: 30px; color:#64748b;">Nenhuma guia cirúrgica registrada.</td></tr>`;
                return;
            }

            let html = '';
            data.forEach(g => {
                const dataFormatada = g.data_envio ? g.data_envio.split('-').reverse().join('/') : '-';
                const valorFormatado = g.valor ? parseFloat(g.valor).toLocaleString('pt-BR', {minimumFractionDigits: 2}) : '0,00';
                
                let statusBadge = getStatusBadge(g.status);

                html += `
                    <tr>
                        <td style="font-weight: 600;">${dataFormatada}</td>
                        <td style="font-weight: 700; color: #0f172a;">${g.paciente || '-'}</td>
                        <td style="font-size: 11px;">${g.procedimento || '-'}</td>
                        <td><span class="status-badge" style="background:#f1f5f9; color:#475569; border:1px solid #e2e8f0;">${g.convenio || '-'}</span></td>
                        <td>${g.hospital || '-'}</td>
                        <td>${statusBadge}</td>
                        <td style="text-align: right; font-weight: bold; color: ${g.valor > 0 ? '#00855B' : '#94a3b8'};">R$ ${valorFormatado}</td>
                        <td style="text-align: center;">
                            <div class="action-btns" style="justify-content: center;">
                                <button class="btn-icon edit" onclick="openModal('${g.id_firebase}')" title="Editar"><i class="fas fa-edit"></i></button>
                                <button class="btn-icon delete" onclick="deleteGuia('${g.id_firebase}')" title="Excluir"><i class="fas fa-trash-alt"></i></button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            tbody.innerHTML = html;
        }

        // Retorna a cor do Status
        function getStatusBadge(status) {
            if (!status) return '-';
            let className = '';
            let icon = '';
            switch(status) {
                case 'Enviado': className = 'st-enviado'; icon = 'fa-paper-plane'; break;
                case 'Aguardando confirmação': className = 'st-aguardando'; icon = 'fa-clock'; break;
                case 'Recebido pelo hospital': className = 'st-recebido'; icon = 'fa-hospital-user'; break;
                case 'Pendente de documento': className = 'st-pendente'; icon = 'fa-exclamation-triangle'; break;
                case 'Autorizado': className = 'st-autorizado'; icon = 'fa-check-circle'; break;
                case 'Cirurgia agendada': className = 'st-agendada'; icon = 'fa-calendar-check'; break;
                default: className = 'st-enviado'; icon = 'fa-info-circle';
            }
            return `<span class="status-badge ${className}"><i class="fas ${icon}"></i> ${status}</span>`;
        }

        // Filtro da Tabela
        function filterTable() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = guiasData.filter(g => 
                (g.paciente && g.paciente.toLowerCase().includes(term)) || 
                (g.procedimento && g.procedimento.toLowerCase().includes(term)) ||
                (g.medico && g.medico.toLowerCase().includes(term))
            );
            renderTable(filtered);
        }

        // Funções do Modal
        function openModal(id = null) {
            document.getElementById('guiaForm').reset();
            document.getElementById('guia_id').value = '';
            
            if (id) {
                document.getElementById('modalTitle').innerText = 'Editar Guia Cirúrgica';
                const guia = guiasData.find(g => g.id_firebase === id);
                if (guia) {
                    document.getElementById('guia_id').value = guia.id_firebase;
                    document.getElementById('data_envio').value = guia.data_envio || '';
                    document.getElementById('paciente').value = guia.paciente || '';
                    document.getElementById('medico').value = guia.medico || '';
                    document.getElementById('hospital').value = guia.hospital || '';
                    document.getElementById('convenio').value = guia.convenio || '';
                    document.getElementById('valor').value = guia.valor || '';
                    document.getElementById('procedimento').value = guia.procedimento || '';
                    document.getElementById('numero_guia').value = guia.numero_guia || '';
                    document.getElementById('forma_envio').value = guia.forma_envio || 'E-mail';
                    document.getElementById('documentos').value = guia.documentos || '';
                    document.getElementById('responsavel').value = guia.responsavel || '';
                    document.getElementById('status').value = guia.status || 'Enviado';
                    document.getElementById('observacao').value = guia.observacao || '';
                }
            } else {
                document.getElementById('modalTitle').innerText = 'Cadastrar Nova Guia';
                document.getElementById('data_envio').value = new Date().toISOString().split('T')[0]; // Data de hoje
            }

            const modal = document.getElementById('guiaModal');
            modal.style.display = 'flex';
            setTimeout(() => modal.classList.add('show'), 10);
        }

        function closeModal() {
            const modal = document.getElementById('guiaModal');
            modal.classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        // Salvar Dados
        async function saveGuia() {
            const form = document.getElementById('guiaForm');
            if (!form.checkValidity()) {
                form.reportValidity();
                return;
            }

            const id = document.getElementById('guia_id').value;
            const btn = document.querySelector('.modal-footer .btn-success');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btn.disabled = true;

            const payload = {
                data_envio: document.getElementById('data_envio').value,
                paciente: document.getElementById('paciente').value,
                medico: document.getElementById('medico').value,
                hospital: document.getElementById('hospital').value,
                convenio: document.getElementById('convenio').value,
                valor: parseFloat(document.getElementById('valor').value) || 0,
                procedimento: document.getElementById('procedimento').value,
                numero_guia: document.getElementById('numero_guia').value,
                forma_envio: document.getElementById('forma_envio').value,
                documentos: document.getElementById('documentos').value,
                responsavel: document.getElementById('responsavel').value,
                status: document.getElementById('status').value,
                observacao: document.getElementById('observacao').value,
                atualizado_em: new Date().toISOString()
            };

            if (id) payload.id_firebase = id;

            try {
                const res = await fetch(`${API_BASE_URL}/${API_TABLE}${id ? '/' + id : ''}`, {
                    method: id ? 'PUT' : 'POST',
                    headers: API_HEADERS,
                    body: JSON.stringify(payload)
                });

                if (!res.ok) throw new Error('Erro ao salvar');
                
                closeModal();
                await loadGuias(); // Recarrega a tabela
            } catch (err) {
                alert('Erro ao salvar guia cirúrgica: ' + err.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        // Excluir Dados
        async function deleteGuia(id) {
            if (!confirm('Tem certeza que deseja excluir este registro de guia cirúrgica?')) return;

            try {
                const res = await fetch(`${API_BASE_URL}/${API_TABLE}/${id}`, {
                    method: 'DELETE',
                    headers: API_HEADERS
                });

                if (!res.ok) throw new Error('Erro ao excluir');
                await loadGuias();
            } catch (err) {
                alert('Erro ao excluir registro: ' + err.message);
            }
        }
    </script>
</body>
</html>
