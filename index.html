<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ECO Oncologia</title>

    <!-- BLINDAGEM: Service Worker + Storage -->
    <script>
        (function() {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.getRegistrations().then(function(regs) {
                    regs.forEach(function(r) { r.unregister(); });
                });
            }

            if ('caches' in window) {
                caches.keys().then(function(names) {
                    names.forEach(function(n) { caches.delete(n); });
                });
            }

            try {
                var t = '__storage_test__';
                localStorage.setItem(t, 'x'.repeat(100000));
                localStorage.removeItem(t);
            } catch(e) {
                try { localStorage.clear(); } catch(e2) {}
            }
        })();
    </script>

    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00855B">
    <link rel="manifest" href="manifest.json?v=final">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/kpCeqqJ.png">
    
    <script>
        const versao = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versao + '">');
        document.write('<script src="global.js?v=' + versao + '"><\/script>');
    </script>
    
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body, html {
            height: 100%; width: 100%; overflow: hidden; display: block;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .split-container { display: flex; height: 100vh; width: 100vw; }

        /* ── Left panel ── */
        .left-pane {
            flex: 1.35;
            position: relative;
            background-image: url('https://imgur.com/h1SrovR.jpg');
            background-size: cover;
            background-position: center;
            overflow: hidden;
        }

        .left-pane::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(0,25,18,0.72) 0%,
                rgba(0,60,40,0.55) 50%,
                rgba(0,25,18,0.65) 100%
            );
        }

        .left-pane-content {
            position: absolute;
            inset: 0;
            z-index: 2;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 48px;
        }

        .left-tagline {
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(52, 211, 153, 0.9);
            margin-bottom: 14px;
        }

        .left-headline {
            font-size: 38px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.15;
            letter-spacing: -0.5px;
            margin-bottom: 18px;
            max-width: 480px;
        }

        .left-headline span {
            color: #34d399;
        }

        .left-desc {
            font-size: 15px;
            color: rgba(255,255,255,0.65);
            line-height: 1.6;
            max-width: 420px;
            font-weight: 400;
        }

        .left-dots {
            display: flex;
            gap: 8px;
            margin-top: 32px;
        }

        .left-dots span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
        }

        .left-dots span:first-child {
            background: #34d399;
            width: 24px;
            border-radius: 4px;
        }

        /* ── Right panel ── */
        .right-pane {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 48px 40px;
            position: relative;
            z-index: 2;
            box-shadow: -8px 0 40px rgba(0,0,0,0.12);
        }

        .login-box {
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .brand-logo {
            max-width: 180px;
            height: auto;
            margin-bottom: 36px;
        }

        .login-eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #00855B;
            margin-bottom: 10px;
        }

        .login-title {
            font-size: 28px;
            color: #0f172a;
            font-weight: 800;
            margin-bottom: 8px;
            letter-spacing: -0.4px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #64748b;
            margin-bottom: 36px;
            line-height: 1.5;
        }

        .login-divider {
            width: 40px;
            height: 3px;
            background: linear-gradient(90deg, #00855B, #00a370);
            border-radius: 2px;
            margin: 0 auto 32px auto;
        }

        /* ── Microsoft button ── */
        .btn-microsoft {
            background: #0f172a;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            width: 100%;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.18s cubic-bezier(0.4,0,0.2,1);
            margin-top: 4px;
            box-shadow: 0 2px 10px rgba(15,23,42,0.18);
            letter-spacing: 0.1px;
        }

        .btn-microsoft:hover {
            background: #1e293b;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(15,23,42,0.22);
        }

        .btn-microsoft:active {
            transform: translateY(0);
        }

        .ms-icon {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5px;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        .ms-tile-red   { width: 7.5px; height: 7.5px; background: #F25022; border-radius: 1px; }
        .ms-tile-green { width: 7.5px; height: 7.5px; background: #7FBA00; border-radius: 1px; }
        .ms-tile-blue  { width: 7.5px; height: 7.5px; background: #00A4EF; border-radius: 1px; }
        .ms-tile-yellow{ width: 7.5px; height: 7.5px; background: #FFB900; border-radius: 1px; }

        /* ── Alert ── */
        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            margin-top: 16px;
            font-size: 12.5px;
            display: none;
            text-align: left;
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
            line-height: 1.4;
        }

        /* ── Spinner ── */
        .loading-spinner {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 3px solid #e2e8f0;
            border-top-color: #00855B;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Security badge ── */
        .login-security {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            margin-top: 28px;
            font-size: 11px;
            color: #94a3b8;
            font-weight: 500;
        }

        .login-security i { font-size: 10px; color: #00855B; }

        .footer-version {
            position: absolute;
            bottom: 16px;
            right: 20px;
            font-size: 10px;
            color: #cbd5e1;
            font-weight: 500;
        }

        /* ── Mobile ── */
        @media (max-width: 900px) {
            .split-container { flex-direction: column; }
            .left-pane { flex: 0.35; }
            .left-pane-content { padding: 28px 24px; }
            .left-headline { font-size: 26px; }
            .left-desc { display: none; }
            .right-pane { flex: 1; padding: 32px 24px; }
        }
    </style>
</head>
<body>
    <div class="split-container">
        <div class="left-pane">
            <div class="left-pane-content">
                <p class="left-tagline">ONCO SMART</p>
                <h2 class="left-headline">Inteligência clínica para<br><span>cuidar melhor</span></h2>
                <p class="left-desc">Sistema integrado de gestão oncológica — centralizando informações, agilizando fluxos e colocando o paciente no centro.</p>
                <div class="left-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
        </div>
        <div class="right-pane">
            <div class="login-box">
                <img src="https://imgur.com/RkjAeVp.png" alt="ECO Oncologia" class="brand-logo">
                <p class="login-eyebrow">ECO Oncologia</p>
                <h1 class="login-title">Bem-vindo</h1>
                <p class="login-subtitle">Acesse com sua conta corporativa<br>para continuar</p>
                <div class="login-divider"></div>

                <div id="loading" class="loading-spinner" style="display: block;"></div>

                <button class="btn-microsoft" onclick="signIn()" id="microsoftBtn" style="display: none;">
                    <div class="ms-icon">
                        <div class="ms-tile-red"></div>
                        <div class="ms-tile-green"></div>
                        <div class="ms-tile-blue"></div>
                        <div class="ms-tile-yellow"></div>
                    </div>
                    Entrar com Microsoft
                </button>

                <div id="errorMsg" class="alert"></div>

                <div class="login-security">
                    <i class="fas fa-shield-alt"></i>
                    Autenticação segura via Microsoft 365
                </div>
            </div>
            <span class="footer-version">v2.0</span>
        </div>
    </div>

    <script>
        // ==========================================
        // BLINDAGEM DO LOCALSTORAGE
        // ==========================================
        function safeClearStorage() {
            try {
                localStorage.removeItem('ecoUser');
                localStorage.removeItem('ecoUserPhoto');
                localStorage.removeItem('ecoSidebarExpanded');
            } catch(e) {
                try { localStorage.clear(); } catch(e2) {}
            }
        }

        function safeSetItem(key, value) {
            try {
                localStorage.setItem(key, value);
                return true;
            } catch(e) {
                console.warn("Storage cheio ao salvar '" + key + "'. Limpando...");
                try {
                    localStorage.clear();
                    localStorage.setItem(key, value);
                    return true;
                } catch(e2) {
                    console.error("Falha crítica ao salvar '" + key + "'.");
                    return false;
                }
            }
        }

        // ==========================================
        // CONFIGURAÇÃO DA MSAL
        // ==========================================
        const msalConfig = {
            auth: {
                clientId: "c8029ec0-cb5e-40a3-bdae-1f050d25bd9e", 
                authority: "https://login.microsoftonline.com/ecooncologia.com.br",
                redirectUri: "https://ecooncologia.com.br/smart/", 
                postLogoutRedirectUri: "https://ecooncologia.com.br/smart/"
            },
            cache: { 
                cacheLocation: "sessionStorage", 
                storeAuthStateInCookie: false 
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // 1. ESCUTA O RETORNO DA MICROSOFT
        msalInstance.handleRedirectPromise().then(response => {
            if (response) {
                handleResponse(response);
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('microsoftBtn').style.display = 'flex';
            }
        }).catch(error => {
            console.error(error);
            mostrarErro("Erro de autenticação da Microsoft. Verifique com a TI.");
        });

        // 2. IR PARA A MICROSOFT
        function signIn() {
            document.getElementById('microsoftBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';

            msalInstance.loginRedirect({
                scopes: ["User.Read", "User.ReadBasic.All"]
            });
        }

        // 3. PROCESSAR DEPOIS DO LOGIN
        async function handleResponse(response) {
            const account = response.account;
            const email = account.username.toLowerCase();
            const name = account.name;

            // Foto (Opcional)
            let photo = "";
            try {
                const tokenResp = await msalInstance.acquireTokenSilent({ 
                    account: account, 
                    scopes: ["User.Read"] 
                });
                const photoReq = await fetch("https://graph.microsoft.com/v1.0/me/photos/64x64/$value", { 
                    headers: { "Authorization": "Bearer " + tokenResp.accessToken } 
                });
                if (photoReq.ok) { 
                    const blob = await photoReq.blob(); 
                    photo = await new Promise(resolve => {
                        const reader = new FileReader(); 
                        reader.onload = () => resolve(reader.result); 
                        reader.readAsDataURL(blob);
                    }); 
                }
            } catch(e) {
                console.warn("Não foi possível buscar a foto:", e.message);
            }

            // API Node.js
            try {
                const apiResponse = await fetch('https://api.ecooncologia.com.br:3000/auth/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': 'EcoOnco_Smart_Seguranca_2026!@'
                    },
                    body: JSON.stringify({ email, name, photo })
                });

                const apiData = await apiResponse.json();

                if (apiData.success) {
                    const user = apiData.user;
                    const perms = user.permissoes || {};
                    
                    // Remove foto do objeto (vai em chave separada)
                    delete user.foto;
                    delete user.photo;

                    // LIMPEZA TOTAL antes de salvar
                    safeClearStorage();
                    
                    // Salva o usuário
                    const saved = safeSetItem('ecoUser', JSON.stringify(user));

                    if (!saved) {
                        // Tentativa mínima
                        safeSetItem('ecoUser', JSON.stringify({
                            email: user.email,
                            nome: user.nome,
                            permissoes: user.permissoes
                        }));
                    }

                    // Foto em chave isolada (se couber)
                    if (photo) {
                        safeSetItem('ecoUserPhoto', photo);
                    }

                    // Roteamento
                    if (typeof APP_PAGES === 'undefined') {
                        throw new Error("Erro interno de rotas.");
                    }

                    let targetPage = 'no-access-teste.html'; 

                    for (const page of APP_PAGES) {
                        if (page.perm === 'helpdesk') {
                            targetPage = page.file;
                            break;
                        }
                        if (page.perm === 'admin' && perms.admin === true) {
                            targetPage = page.file;
                            break;
                        }
                        if (perms[page.perm] === true) {
                            targetPage = page.file;
                            break;
                        }
                    }

                    window.location.href = targetPage;

                } else {
                    throw new Error(apiData.error || "Acesso negado no banco de dados.");
                }

            } catch (err) {
                mostrarErro("Erro de Conexão com a API: " + err.message);
            }
        }

        function mostrarErro(mensagem) {
            document.getElementById('errorMsg').innerText = mensagem;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('microsoftBtn').style.display = 'flex';
        }
    </script>
</body>
</html>
