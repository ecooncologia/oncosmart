<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ECO Oncologia</title>
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#00855B">
    <link rel="manifest" href="manifest.json?v=final">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/kpCeqqJ.png">
    
    <script>
        const versao = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versao + '">');
        document.write('<script src="global.js?v=' + versao + '"><\/script>');
    </script>
    
    <script type="text/javascript" src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body, html { height: 100%; width: 100%; overflow: hidden; }
        .split-container { display: flex; height: 100vh; width: 100vw; }
        
        .left-pane { 
            flex: 1.3; position: relative; 
            background-image: url('https://imgur.com/h1SrovR.jpg'); 
            background-size: cover; background-position: center; 
        }
        .left-pane::after { content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.3); }

        .right-pane { 
            flex: 1; background: white; display: flex; flex-direction: column; 
            justify-content: center; align-items: center; padding: 40px; 
            position: relative; z-index: 2; box-shadow: -5px 0 20px rgba(0,0,0,0.1); 
        }

        .login-box { width: 100%; max-width: 350px; text-align: center; }
        .brand-logo { max-width: 200px; height: auto; margin-bottom: 30px; }
        .login-title { font-size: 32px; color: #20343D; font-weight: 400; margin-bottom: 10px; }
        .title-separator { width: 100%; height: 4px; background-color: #00855B; margin: 0 auto 30px auto; border-radius: 2px; }

        .btn-microsoft { 
            background-color: #2F2F2F; color: white; border: none; padding: 14px 24px; 
            font-size: 15px; font-weight: 500; display: flex; align-items: center; justify-content: center; 
            gap: 15px; width: 100%; cursor: pointer; border-radius: 4px; transition: 0.2s; margin-top: 20px; 
        }
        .btn-microsoft:hover { background-color: #000; }
        
        .ms-icon { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; width: 18px; height: 18px; }
        .ms-tile { width: 8px; height: 8px; background-color: white; }

        .alert { 
            padding: 12px; border-radius: 4px; margin-top: 20px; font-size: 13px; 
            display: none; text-align: left; background: #FFF5F5; color: #C53030; border: 1px solid #FEB2B2; 
        }
        
        .loading-spinner { 
            border: 3px solid #f3f3f3; border-top: 3px solid #00855B; border-radius: 50%; 
            width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        .footer-version { position: absolute; bottom: 10px; right: 10px; font-size: 10px; color: #ccc; }
        @media (max-width: 900px) { .split-container { flex-direction: column; } .left-pane { flex: 0.4; } .right-pane { flex: 1; } }
    </style>
</head>
<body>
    <div class="split-container">
        <div class="left-pane"></div>
        <div class="right-pane">
            <div class="login-box">
                <img src="https://imgur.com/RkjAeVp.png" alt="ECO Oncologia" class="brand-logo">
                <h1 class="login-title">Entrar</h1>
                <div class="title-separator"></div>

                <div id="loading" class="loading-spinner" style="display: block;"></div>

                <button class="btn-microsoft" onclick="signIn()" id="microsoftBtn" style="display: none;">
                    <div class="ms-icon">
                        <div class="ms-tile"></div><div class="ms-tile"></div>
                        <div class="ms-tile"></div><div class="ms-tile"></div>
                    </div>
                    Entrar com Microsoft
                </button>
                
                <div id="errorMsg" class="alert"></div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DA MSAL ---
        const msalConfig = {
            auth: {
                clientId: "c8029ec0-cb5e-40a3-bdae-1f050d25bd9e", 
                authority: "https://login.microsoftonline.com/ecooncologia.com.br",
                redirectUri: "https://ecooncologia.com.br/smart/", 
                postLogoutRedirectUri: "https://ecooncologia.com.br/smart/"
            },
            cache: { 
                cacheLocation: "sessionStorage", 
                storeAuthStateInCookie: false 
            }
        };

        const msalInstance = new msal.PublicClientApplication(msalConfig);

        // 1. ESCUTA O RETORNO DA MICROSOFT
        msalInstance.handleRedirectPromise().then(response => {
            if (response) {
                handleResponse(response);
            } else {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('microsoftBtn').style.display = 'flex';
            }
        }).catch(error => {
            console.error(error);
            mostrarErro("Erro de autenticação da Microsoft. Verifique com a TI.");
        });

        // 2. IR PARA A MICROSOFT
        function signIn() {
            document.getElementById('microsoftBtn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';

            msalInstance.loginRedirect({
                scopes: ["User.Read", "User.ReadBasic.All"]
            });
        }

        // 3. PROCESSAR DEPOIS DO LOGIN
        async function handleResponse(response) {
            const account = response.account;
            const email = account.username.toLowerCase();
            const name = account.name;

            // Foto (Opcional)
            let photo = "";
            try {
                const tokenResp = await msalInstance.acquireTokenSilent({ account: account, scopes: ["User.Read"] });
                const photoReq = await fetch("https://graph.microsoft.com/v1.0/me/photos/64x64/$value", { headers: { "Authorization": `Bearer ${tokenResp.accessToken}` } });
                if(photoReq.ok) { const blob = await photoReq.blob(); photo = await new Promise(r => {const a=new FileReader(); a.onload=()=>r(a.result); a.readAsDataURL(blob)}); }
            } catch(e) {}

            // API Node.js com a Chave de Segurança
            try {
                const apiResponse = await fetch('https://api.ecooncologia.com.br:3000/auth/login', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-api-key': 'EcoOnco_Smart_Seguranca_2026!@' // CHAVE AQUI
                    },
                    body: JSON.stringify({ email, name, photo })
                });

                const apiData = await apiResponse.json();

                if (apiData.success) {
                    const user = apiData.user;
                    const perms = user.permissoes || {};
                    
                    localStorage.setItem('ecoUser', JSON.stringify(user));
                    if(photo) localStorage.setItem('ecoUserPhoto', photo);
                    
                    if (typeof APP_PAGES === 'undefined') {
                        throw new Error("Erro interno de rotas.");
                    }

                    let targetPage = 'no-access-teste.html'; 

                    for (const page of APP_PAGES) {
                        if (page.perm === 'helpdesk') {
                            targetPage = page.file;
                            break;
                        }
                        if (page.perm === 'admin' && perms.admin === true) {
                            targetPage = page.file;
                            break;
                        }
                        if (perms[page.perm] === true) {
                            targetPage = page.file;
                            break;
                        }
                    }

                    window.location.href = targetPage;

                } else {
                    throw new Error(apiData.error || "Acesso negado no banco de dados.");
                }

            } catch (err) {
                mostrarErro("Erro de Conexão com a API: " + err.message);
            }
        }

        function mostrarErro(mensagem) {
            document.getElementById('errorMsg').innerText = mensagem;
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('loading').style.display = 'none';
            document.getElementById('microsoftBtn').style.display = 'flex';
        }
    </script>
</body>
</html>
