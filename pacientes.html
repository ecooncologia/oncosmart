<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - ECO Sistema</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { width: 100%; padding: 20px; box-sizing: border-box; }
        
        .controls { background: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        
        .input-group { margin-bottom: 0; display: flex; flex-direction: column; }
        .label-title { font-size: 11px; font-weight: 700; color: #4b5563; margin-bottom: 4px; text-transform: uppercase; }
        .input-field { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; height: 38px; box-sizing: border-box; min-width: 250px; outline: none; }
        .input-field:focus { border-color: #00995D; box-shadow: 0 0 0 3px rgba(0, 153, 93, 0.1); }
        
        .btn-primary { background: #00995D; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; gap: 8px; align-items: center; height: 38px; transition: 0.2s; }
        .btn-primary:hover { background: #007a4a; }
        
        /* DESIGN DAS ABAS */
        .tabs-nav { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 0; overflow-x: auto; }
        .tab-btn { padding: 12px 20px; border: 1px solid #e5e7eb; border-bottom: none; font-weight: 700; color: #64748b; cursor: pointer; border-radius: 10px 10px 0 0; transition: 0.3s; font-size: 13px; outline: none; white-space: nowrap; }
        .tab-btn:nth-of-type(odd):not(.active) { background: #ecfdf5; }
        .tab-btn:nth-of-type(even):not(.active) { background: #fffbeb; }
        .tab-btn:hover:not(.active) { background: #f1f5f9; color: #334155; }
        .tab-btn.active { color: #00995D; border-top: 4px solid #00995D; background: white; margin-bottom: -2px; padding-bottom: 14px; box-shadow: 0 -4px 6px -4px rgba(0,0,0,0.05); z-index: 2; }

        .sheet-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 10px; }
        .table-responsive { overflow-x: auto; background: white; padding-bottom: 10px; max-height: 700px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { background: #00995D; color: white; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; }
        .data-table td { padding: 12px; border-bottom: 1px solid #eee; color: #333; vertical-align: middle; }
        
        /* Badges de Status */
        .badge { padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 11px; display: inline-block; text-align: center; }
        .bg-new { background: #fef08a; color: #854d0e; border: 1px solid #fde047; animation: pulse 2s infinite; }
        .bg-linked { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .bg-inactive { background: #e5e7eb; color: #4b5563; border: 1px solid #d1d5db; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .origem-unimed { background: #d1fae5; color: #059669; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }
        .origem-part { background: #fef3c7; color: #b45309; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-left: 5px; }

        .actions-cell { display: flex; justify-content: center; gap: 8px; }
        .btn-icon { width: 32px; height: 32px; border-radius: 6px; border: 1px solid #e5e7eb; background: white; color: #4b5563; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-icon:hover { background: #f3f4f6; color: #1f2937; }
        .btn-icon-link:hover { background: #e0f2fe; color: #0284c7; border-color: #bae6fd; }
        .btn-icon-edit:hover { background: #fef3c7; color: #ca8a04; border-color: #fde68a; }
        .btn-icon-ban:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
        .btn-icon-danger { color: #dc2626; border-color: #fca5a5; background: #fff5f5; }
        .btn-icon-danger:hover { background: #dc2626; color: white; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 400px; max-width: 90%; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; }
        .modal-header { background: #00995D; color: white; padding: 15px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; background: #f9fafb; }
        
        .form-label { font-weight: bold; font-size: 12px; color: #4b5563; margin-bottom: 5px; display: block; }
        .form-select, .form-textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; margin-bottom: 15px; box-sizing: border-box; }
        .form-textarea { resize: vertical; min-height: 80px; }
        
        .btn-sync { background: #4b5563; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: 600; height: 38px; transition: 0.2s; }
        .btn-sync:hover { background: #374151; }
    </style>
</head>
<body>
    <div class="container">
        <div id="global-header" class="header"></div>
        <div id="global-nav"></div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchPatientTab('todos', this)">Todos</button>
            <button class="tab-btn" onclick="switchPatientTab('novos', this)">Novos (Sem Vínculo)</button>
            <button class="tab-btn" onclick="switchPatientTab('vinculados', this)">Vinculados</button>
            <button class="tab-btn" onclick="switchPatientTab('unimed', this)"><i class="fas fa-notes-medical"></i> Base Unimed</button>
            <button class="tab-btn" onclick="switchPatientTab('particular', this)"><i class="fas fa-star"></i> Base Particular</button>
            <button class="tab-btn" onclick="switchPatientTab('inativos', this)"><i class="fas fa-ban"></i> Inativos</button>
        </div>

        <div class="controls">
            <div style="display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap;">
                
                <div class="input-group">
                    <label class="label-title">Mês Ativo</label>
                    <select id="selMonthPat" class="input-field" style="min-width:130px;" onchange="loadActivityData()"></select>
                </div>
                <div class="input-group">
                    <label class="label-title">Ano</label>
                    <select id="selYearPat" class="input-field" style="min-width:100px;" onchange="loadActivityData()"></select>
                </div>
                
                <div class="input-group">
                    <label class="label-title">Buscar</label>
                    <input type="text" id="searchPatient" class="input-field" placeholder="Buscar por nome ou carteirinha..." onkeyup="renderTable()">
                </div>
                <div class="input-group">
                    <label class="label-title">Filtro Médico</label>
                    <select id="filterDoctor" class="input-field" onchange="renderTable()" style="min-width: 200px;">
                        <option value="">Todos os Médicos</option>
                    </select>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; align-items: center; margin-top:10px;">
                <span id="syncIndicator" style="font-size: 12px; color: #6b7280; display: none;">
                    <i class="fas fa-sync-alt fa-spin"></i> Processando BD...
                </span>
                
                <button class="btn-primary" style="background:#3b82f6;" onclick="openBulkLinkModal()">
                    <i class="fas fa-link"></i> Vincular em Massa
                </button>

                <button class="btn-primary" onclick="openAddModal()">
                    <i class="fas fa-user-plus"></i> Novo Manual
                </button>
            </div>
        </div>

        <div class="sheet-container">
            <div class="table-responsive">
                <table class="data-table" id="patientsTable">
                    <thead>
                        <tr>
                            <th style="width: 40px; text-align:center;"><input type="checkbox" id="checkAll" onchange="toggleAllPatients(this)"></th>
                            <th style="width: 25%">Nome do Paciente</th>
                            <th style="width: 15%">Carteirinha</th>
                            <th style="width: 10%; text-align: center;">Status</th>
                            <th style="width: 30%">Médico(s) Vinculado(s)</th>
                            <th style="width: 15%; text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> Carregando pacientes...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addEditModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="addEditModalTitle">Adicionar Paciente</span>
                <button class="modal-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editPatientId">
                <label class="form-label">Nome Completo</label>
                <input type="text" id="patientNameInput" class="form-select" placeholder="Ex: JOÃO DA SILVA" style="text-transform: uppercase;">
                
                <label class="form-label">Beneficiário Código (Carteirinha Unimed)</label>
                <input type="text" id="patientCarteirinhaInput" class="form-select" placeholder="Ex: 0000000000000">
            </div>
            <div class="modal-footer">
                <button class="btn-sync" style="background: #9ca3af;" onclick="closeModals()">Cancelar</button>
                <button class="btn-primary" onclick="savePatient()">Salvar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="linkModal">
        <div class="modal-content" style="width: 450px;">
            <div class="modal-header">
                <span id="linkModalTitle">Vincular Médicos</span>
                <button class="modal-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Paciente(s): <strong id="linkPatientName" style="color: #000; font-size: 14px;"></strong></p>
                <input type="hidden" id="linkPatientId">
                
                <div style="background: #fdf2f8; border: 1px solid #fbcfe8; padding: 12px; border-radius: 8px; margin-bottom: 15px;">
                    <label class="form-label" style="color: #be185d; margin-bottom: 8px;"><i class="fas fa-stethoscope"></i> Médico Prescritor</label>
                    <select id="linkPrescritorSelect" class="form-select" style="margin-bottom: 0; border-color: #fbcfe8;">
                        <option value="">-- Nenhum --</option>
                    </select>
                </div>

                <div style="background: #fff7ed; border: 1px solid #fed7aa; padding: 12px; border-radius: 8px;">
                    <label class="form-label" style="color: #c2410c; margin-bottom: 8px;"><i class="fas fa-share-square"></i> Médico Encaminhador</label>
                    <select id="linkEncaminhadorSelect" class="form-select" style="margin-bottom: 0; border-color: #fed7aa;">
                        <option value="">-- Nenhum --</option>
                    </select>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-sync" style="background: #9ca3af;" onclick="closeModals()">Cancelar</button>
                <button class="btn-primary" id="btnSaveLink" onclick="saveDoctorLink()"><i class="fas fa-check"></i> Salvar Vínculos</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="inactivateModal">
        <div class="modal-content">
            <div class="modal-header" style="background: #dc2626;">
                <span>Inativar Paciente</span>
                <button class="modal-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Paciente: <strong id="inactivatePatientName" style="color: #000;"></strong></p>
                <input type="hidden" id="inactivatePatientId">
                
                <label class="form-label">Motivo da Inativação (Obrigatório)</label>
                <textarea id="inactivateReason" class="form-textarea" placeholder="Ex: Paciente transferido, óbito, fim do tratamento..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-sync" style="background: #9ca3af;" onclick="closeModals()">Cancelar</button>
                <button class="btn-primary" style="background: #dc2626;" onclick="saveInactivation()">Confirmar Inativação</button>
            </div>
        </div>
    </div>

    <script>
        let patients = {};
        let doctors = {};
        let bulkLinkIds = []; 
        let currentTab = 'todos';
        
        // NOVO: Memória de atividade dos pacientes (saber quem estava em qual mês)
        window.patientActivityMap = {};

        const monthsList = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

        const generatePatientId = (name) => {
            return 'pac_' + String(name).normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        };

        function normalizeData(apiData) {
            if (!apiData) return {}; const normalized = {};
            Object.entries(apiData).forEach(([key, val]) => {
                if (typeof val === 'string' && (val.startsWith('{') || val.startsWith('['))) { try { normalized[key] = JSON.parse(val); } catch(e) { normalized[key] = val; }
                } else { normalized[key] = val; }
            }); return normalized;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initGlobal('pacientes', 'Gestão de Pacientes');
            
            // Popula os seletores de Mês e Ano
            const now = new Date(); 
            const curY = now.getFullYear(); 
            let curM = now.getMonth() - 1; // Puxa o mês passado por padrão, igual repasse
            if (curM < 0) curM = 11;
            
            const elYear = document.getElementById('selYearPat'); 
            for(let i = curY - 2; i <= curY + 2; i++) { elYear.add(new Option(i, i)); }
            elYear.value = curY; 
            
            const elMonth = document.getElementById('selMonthPat');
            monthsList.forEach((m, i) => elMonth.add(new Option(m, i)));
            elMonth.value = curM;

            await loadDoctors();
            await loadPatients();
            await loadActivityData(); // Carrega os dados do robô e filtra
        });

        function switchPatientTab(tabName, element) {
            currentTab = tabName;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            renderTable();
        }

        // ==========================================
        // 1. CARREGAMENTO DE DADOS E FILTROS
        // ==========================================
        async function loadDoctors() {
            try {
                const res = await fetch(`${API_BASE_URL}/medicos`, { headers: API_HEADERS });
                if(res.ok) {
                    doctors = normalizeData(await res.json());
                    const selPresc = document.getElementById('linkPrescritorSelect');
                    const selEncam = document.getElementById('linkEncaminhadorSelect');
                    const selFilter = document.getElementById('filterDoctor');
                    
                    selPresc.innerHTML = '<option value="">-- Nenhum --</option>';
                    selEncam.innerHTML = '<option value="">-- Nenhum --</option>';
                    selFilter.innerHTML = '<option value="">Todos os Médicos</option>';

                    Object.entries(doctors).sort((a,b) => (a[1].nome || '').localeCompare(b[1].nome || '')).forEach(([id, doc]) => {
                        if (doc.prescritor === 'sim') selPresc.add(new Option(doc.nome, id));
                        if (doc.encaminhador === 'sim') selEncam.add(new Option(doc.nome, id));
                        selFilter.add(new Option(doc.nome, id));
                    });
                }
            } catch(e) {}
        }

        async function loadPatients() {
            const tbody = document.querySelector('#patientsTable tbody');
            try {
                const res = await fetch(`${API_BASE_URL}/pacientes`, { headers: API_HEADERS });
                if(res.ok) patients = normalizeData(await res.json());
                else patients = {};
            } catch(e) { 
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red;">Erro ao conectar com o banco de pacientes.</td></tr>';
            }
        }

        // ==========================================
        // 2. SINCRONIZAÇÃO E INATIVAÇÃO AUTOMÁTICA
        // ==========================================
        async function loadActivityData() {
            const indicator = document.getElementById('syncIndicator');
            indicator.style.display = 'inline-block';
            document.querySelector('#patientsTable tbody').innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> Sincronizando Mês...</td></tr>';

            try {
                const [resUnimed, resVendas] = await Promise.all([
                    fetch(`${API_BASE_URL}/repasse_unimed`, { headers: API_HEADERS }),
                    fetch(`${API_BASE_URL}/vendas`, { headers: API_HEADERS })
                ]);

                const unimedData = resUnimed.ok ? normalizeData(await resUnimed.json()) : {};
                const vendasData = resVendas.ok ? normalizeData(await resVendas.json()) : {};
                const unimedArray = Object.values(unimedData);

                // Constrói o mapa de atividade: Quem apareceu em qual mês
                window.patientActivityMap = {};
                
                // Processa Unimed
                unimedArray.forEach(row => {
                    if (row.paciente && row.competencia) {
                        const patId = generatePatientId(row.paciente);
                        if (!window.patientActivityMap[patId]) window.patientActivityMap[patId] = new Set();
                        window.patientActivityMap[patId].add(row.competencia);
                    }
                });

                // Processa Particulares
                Object.values(vendasData).forEach(v => {
                    if (v.tipo_registro === 'particular' && (v.procedimento || '').toUpperCase().includes('APLICA')) {
                        const dateParts = (v.data || '').split('-');
                        if (dateParts.length >= 2) {
                            const vComp = `${dateParts[1]}/${dateParts[0]}`;
                            const patId = generatePatientId(v.paciente);
                            if (!window.patientActivityMap[patId]) window.patientActivityMap[patId] = new Set();
                            window.patientActivityMap[patId].add(vComp);
                        }
                    }
                });

                // Roda o Auto-Cadastrador da Unimed (para pacientes que vieram do robô e não estão no BD)
                let dadosAtualizados = false;
                for (const row of unimedArray) {
                    if (row.paciente) {
                        const patName = String(row.paciente).toUpperCase().trim();
                        const patId = generatePatientId(patName);
                        const carteirinhaRobo = row.carteirinha || '';

                        if (!patients[patId]) {
                            const newPat = {
                                id_firebase: patId, nome: patName, carteirinha: carteirinhaRobo,
                                doctor_id: "", prescritor_id: "", encaminhador_id: "", status: "ativo", 
                                origem: 'unimed', data_criacao: new Date().toISOString()
                            };
                            await fetch(API_BASE_URL + '/pacientes', { method: 'POST', headers: API_HEADERS, body: JSON.stringify(newPat) });
                            patients[patId] = newPat;
                            dadosAtualizados = true;
                        } else {
                            let updated = false;
                            if (!patients[patId].carteirinha && carteirinhaRobo) { patients[patId].carteirinha = carteirinhaRobo; updated = true; }
                            if (patients[patId].origem !== 'auto_particular' && patients[patId].origem !== 'unimed') { patients[patId].origem = 'unimed'; updated = true; }
                            if (updated) {
                                await fetch(API_BASE_URL + '/pacientes', { method: 'POST', headers: API_HEADERS, body: JSON.stringify(patients[patId]) });
                                dadosAtualizados = true;
                            }
                        }
                    }
                }

                // RODA A INATIVAÇÃO INTELIGENTE PARA O MÊS SELECIONADO
                await processAutoInactivation(unimedArray);
                
                renderTable();
            } catch(e) { } finally { indicator.style.display = 'none'; }
        }

        async function processAutoInactivation(unimedArray) {
            const mesSel = parseInt(document.getElementById('selMonthPat').value) + 1;
            const anoSel = parseInt(document.getElementById('selYearPat').value);
            const compAtual = `${String(mesSel).padStart(2,'0')}/${anoSel}`;
            
            let mesAnt = mesSel - 1; let anoAnt = anoSel;
            if (mesAnt === 0) { mesAnt = 12; anoAnt -= 1; }
            const compAnt = `${String(mesAnt).padStart(2,'0')}/${anoAnt}`;

            const patsAtual = new Set(unimedArray.filter(r => r.competencia === compAtual).map(r => generatePatientId(r.paciente)));
            const patsAnt = new Set(unimedArray.filter(r => r.competencia === compAnt).map(r => generatePatientId(r.paciente)));

            // Se não houver dados no mês atual, não inativa ninguém para evitar acidentes antes do robô rodar!
            if (patsAtual.size === 0) return; 

            let inativados = false;
            for (let patId of patsAnt) {
                if (!patsAtual.has(patId) && patients[patId] && patients[patId].status !== 'inativo') {
                    patients[patId].status = 'inativo';
                    patients[patId].motivo_inativacao = `Ausência de faturamento Unimed em ${compAtual}`;
                    await fetch(API_BASE_URL + '/pacientes', { method: 'POST', headers: API_HEADERS, body: JSON.stringify(patients[patId]) });
                    inativados = true;
                }
            }
        }

        // ==========================================
        // 3. RENDERIZAÇÃO DA TABELA (Com filtro de Mês)
        // ==========================================
        function toggleAllPatients(source) {
            const checkboxes = document.querySelectorAll('.patient-checkbox');
            checkboxes.forEach(cb => cb.checked = source.checked);
        }

        function renderTable() {
            const tbody = document.querySelector('#patientsTable tbody');
            const searchTerm = document.getElementById('searchPatient').value.toUpperCase();
            const filterDocId = document.getElementById('filterDoctor').value; 
            
            const mesSel = parseInt(document.getElementById('selMonthPat').value) + 1;
            const anoSel = parseInt(document.getElementById('selYearPat').value);
            const compSelecionada = `${String(mesSel).padStart(2,'0')}/${anoSel}`;

            const patArray = Object.values(patients).sort((a,b) => a.nome.localeCompare(b.nome));
            let html = '';

            patArray.forEach(p => {
                // Inteligência: O Paciente apareceu no Mês Selecionado?
                const teveAtividadeNoMes = window.patientActivityMap[p.id_firebase] && window.patientActivityMap[p.id_firebase].has(compSelecionada);
                
                // Se a pessoa quer ver Inativos do sistema todo, mostramos. Se não, filtramos pelo mês.
                if (currentTab !== 'inativos' && !teveAtividadeNoMes) return;

                const isInactive = p.status === 'inativo';
                const hasDoctor = p.prescritor_id || p.encaminhador_id || p.doctor_id;
                const cartStr = p.carteirinha || '';
                const isParticular = p.origem === 'auto_particular';

                if (currentTab === 'inativos' && !isInactive) return;
                if (currentTab !== 'inativos') {
                    if (isInactive) return;
                    if (currentTab === 'novos' && hasDoctor) return;
                    if (currentTab === 'vinculados' && !hasDoctor) return;
                    if (currentTab === 'unimed' && isParticular) return;
                    if (currentTab === 'particular' && !isParticular) return;
                }

                if (searchTerm && !p.nome.includes(searchTerm) && !cartStr.includes(searchTerm)) return;

                if (filterDocId) {
                    if (p.prescritor_id !== filterDocId && p.encaminhador_id !== filterDocId && p.doctor_id !== filterDocId) {
                        return;
                    }
                }

                let statusBadge = '';
                let doctorNameHtml = '';
                
                let origemBadge = isParticular ? `<span class="origem-part">Particular</span>` : `<span class="origem-unimed">Unimed</span>`;
                if (!p.origem && !isParticular) origemBadge = `<span class="origem-unimed">Unimed</span>`;

                if (isInactive) {
                    statusBadge = `<span class="badge bg-inactive" title="Motivo: ${p.motivo_inativacao || 'Não informado'}"><i class="fas fa-ban"></i> Inativo</span>`;
                    doctorNameHtml = `<span style="color:#9ca3af; text-decoration: line-through;">Cadastro Inativo</span>`;
                } else if (hasDoctor) {
                    statusBadge = `<span class="badge bg-linked"><i class="fas fa-check-circle"></i> Vinculado</span>`;
                    
                    let pName = p.prescritor_id && doctors[p.prescritor_id] ? doctors[p.prescritor_id].nome : null;
                    let eName = p.encaminhador_id && doctors[p.encaminhador_id] ? doctors[p.encaminhador_id].nome : null;

                    if (!pName && !eName && p.doctor_id && doctors[p.doctor_id]) {
                        doctorNameHtml = `<span style="color:#6b7280; font-style:italic;"><i class="fas fa-history"></i> ${doctors[p.doctor_id].nome} (Vínculo Antigo - Favor Atualizar)</span>`;
                    } else {
                        if (pName) doctorNameHtml += `<div style="color:#be185d; font-weight:bold; font-size:12px; margin-bottom:5px;"><i class="fas fa-stethoscope"></i> Prescritor: ${pName}</div>`;
                        if (eName) doctorNameHtml += `<div style="color:#c2410c; font-weight:bold; font-size:12px;"><i class="fas fa-share-square"></i> Encaminhador: ${eName}</div>`;
                    }
                } else {
                    statusBadge = `<span class="badge bg-new"><i class="fas fa-exclamation-circle"></i> Novo</span>`;
                    doctorNameHtml = `<span style="color:#9ca3af; font-style:italic;">Aguardando vínculo...</span>`;
                }

                let actionButtons = `
                    <button class="btn-icon btn-icon-link" title="Vincular Médico" onclick="openLinkModal('${p.id_firebase}', '${p.nome}', '${p.prescritor_id || ''}', '${p.encaminhador_id || ''}')">
                        <i class="fas fa-link"></i>
                    </button>
                    <button class="btn-icon btn-icon-edit" title="Editar Cadastro" onclick="openEditModal('${p.id_firebase}')">
                        <i class="fas fa-edit"></i>
                    </button>
                `;

                if (!isInactive) {
                    actionButtons += `
                    <button class="btn-icon btn-icon-ban" title="Inativar Paciente" onclick="openInactivateModal('${p.id_firebase}', '${p.nome}')">
                        <i class="fas fa-ban"></i>
                    </button>`;
                }

                actionButtons += `
                    <button class="btn-icon btn-icon-danger" title="Excluir Permanentemente" onclick="deletePatient('${p.id_firebase}')">
                        <i class="fas fa-trash"></i>
                    </button>
                `;

                html += `<tr>
                    <td style="text-align:center;">
                        <input type="checkbox" class="patient-checkbox" value="${p.id_firebase}">
                    </td>
                    <td style="font-weight: bold; color: ${isInactive ? '#9ca3af' : '#1f2937'};">${p.nome} ${origemBadge}</td>
                    <td style="font-family: monospace; color: #4b5563;">${cartStr || '-'}</td>
                    <td style="text-align: center;">${statusBadge}</td>
                    <td>${doctorNameHtml}</td>
                    <td><div class="actions-cell">${actionButtons}</div></td>
                </tr>`;
            });

            if (html === '') html = `<tr><td colspan="6" style="text-align:center; padding: 20px; color: #6b7280;">Nenhum paciente processado em <b>${compSelecionada}</b> neste filtro.</td></tr>`;
            tbody.innerHTML = html;
        }

        // ==========================================
        // 4. FUNÇÕES DE CRUD E MODAIS
        // ==========================================
        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active')); }

        function openAddModal() {
            document.getElementById('editPatientId').value = ''; document.getElementById('patientNameInput').value = '';
            document.getElementById('patientCarteirinhaInput').value = ''; document.getElementById('addEditModalTitle').innerText = 'Adicionar Novo Paciente';
            document.getElementById('addEditModal').classList.add('active');
        }

        function openEditModal(id) {
            const pat = patients[id]; if(!pat) return;
            document.getElementById('editPatientId').value = id; document.getElementById('patientNameInput').value = pat.nome;
            document.getElementById('patientCarteirinhaInput').value = pat.carteirinha || ''; document.getElementById('addEditModalTitle').innerText = 'Editar Cadastro do Paciente';
            document.getElementById('addEditModal').classList.add('active');
        }

        async function savePatient() {
            const idInput = document.getElementById('editPatientId').value;
            const nameInput = document.getElementById('patientNameInput').value.trim().toUpperCase();
            const cartInput = document.getElementById('patientCarteirinhaInput').value.trim();
            
            if (!nameInput) return alert('O nome é obrigatório!');

            if (idInput) {
                patients[idInput].nome = nameInput; patients[idInput].carteirinha = cartInput;
                try { await fetch(API_BASE_URL + '/pacientes', { method: 'POST', headers: API_HEADERS, body: JSON.stringify(patients[idInput]) });
                } catch(e) { alert("Erro ao editar."); }
            } else {
                const newId = generatePatientId(nameInput);
                if (patients[newId]) return alert('Este paciente já existe na base de dados!');
                const newPat = { id_firebase: newId, nome: nameInput, carteirinha: cartInput, doctor_id: "", prescritor_id: "", encaminhador_id: "", status: "ativo", origem: "manual", data_criacao: new Date().toISOString() };
                try { await fetch(API_BASE_URL + '/pacientes', { method: 'POST', headers: API_HEADERS, body: JSON.stringify(newPat) }); patients[newId] = newPat;
                } catch(e) { alert("Erro ao criar."); }
            }
            closeModals(); loadActivityData();
        }

        function openLinkModal(id, name, prescritorId, encaminhadorId) {
            bulkLinkIds = [id]; 
            document.getElementById('linkModalTitle').innerText = 'Vincular Médicos';
            document.getElementById('linkPatientName').innerText = name;
            document.getElementById('linkPrescritorSelect').value = prescritorId || '';
            document.getElementById('linkEncaminhadorSelect').value = encaminhadorId || '';
            document.getElementById('linkModal').classList.add('active');
        }

        function openBulkLinkModal() {
            const checkboxes = document.querySelectorAll('.patient-checkbox:checked');
            if (checkboxes.length === 0) return alert('Por favor, selecione pelo menos um paciente clicando nas caixinhas ao lado do nome.');
            
            bulkLinkIds = Array.from(checkboxes).map(cb => cb.value);
            document.getElementById('linkModalTitle').innerText = 'Vincular em Massa';
            document.getElementById('linkPatientName').innerText = `${bulkLinkIds.length} paciente(s) selecionado(s)`;
            
            document.getElementById('linkPrescritorSelect').value = '';
            document.getElementById('linkEncaminhadorSelect').value = '';
            document.getElementById('linkModal').classList.add('active');
        }

        async function saveDoctorLink() {
            const pId = document.getElementById('linkPrescritorSelect').value;
            const eId = document.getElementById('linkEncaminhadorSelect').value;
            
            if (bulkLinkIds.length === 0) return;

            const btnSave = document.getElementById('btnSaveLink');
            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Salvando...';
            btnSave.disabled = true;

            const promises = bulkLinkIds.map(patId => {
                patients[patId].prescritor_id = pId;
                patients[patId].encaminhador_id = eId;
                patients[patId].doctor_id = pId || eId || ""; 
                if(patients[patId].status === 'inativo') patients[patId].status = 'ativo';

                return fetch(API_BASE_URL + '/pacientes', {
                    method: 'POST', headers: API_HEADERS, body: JSON.stringify(patients[patId])
                });
            });

            try {
                await Promise.all(promises);
                closeModals();
                if(document.getElementById('checkAll')) document.getElementById('checkAll').checked = false;
                renderTable();
                bulkLinkIds = [];
            } catch(e) { 
                alert("Erro ao salvar vínculos."); 
            } finally {
                btnSave.innerHTML = '<i class="fas fa-check"></i> Salvar Vínculos';
                btnSave.disabled = false;
            }
        }

        function openInactivateModal(id, name) {
            document.getElementById('inactivatePatientId').value = id; document.getElementById('inactivatePatientName').innerText = name;
            document.getElementById('inactivateReason').value = ''; document.getElementById('inactivateModal').classList.add('active');
        }

        async function saveInactivation() {
            const patId = document.getElementById('inactivatePatientId').value; const reason = document.getElementById('inactivateReason').value.trim();
            if (!reason) return alert('O motivo da inativação é obrigatório!');
            patients[patId].status = 'inativo'; patients[patId].motivo_inativacao = reason;
            try { await fetch(API_BASE_URL + '/pacientes', { method: 'POST', headers: API_HEADERS, body: JSON.stringify(patients[patId]) }); closeModals(); renderTable();
            } catch(e) { alert("Erro ao inativar paciente."); }
        }

        async function deletePatient(id) {
            if(!confirm("CUIDADO: Tem certeza que deseja EXCLUIR PERMANENTEMENTE este paciente?\n\nSe ele aparecer na Unimed novamente, será recriado do zero.")) return;
            try { await fetch(`${API_BASE_URL}/pacientes/${id}`, { method: 'DELETE', headers: API_HEADERS }); delete patients[id]; renderTable();
            } catch(e) { alert('Erro ao tentar excluir do banco.'); }
        }
    </script>
</body>
</html>
