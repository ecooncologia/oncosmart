<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixinha da ECO - ONCO SMART</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <style>
        .tabs-container { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; padding-bottom: 0px; overflow-x: auto; }
        .tab-btn { background: var(--primary); color: white; border: 1px solid var(--primary); border-bottom: none; padding: 12px 24px; font-size: 14px; font-weight: 700; cursor: default; border-radius: 12px 12px 0 0; white-space: nowrap; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 25px; }
        .kpi-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 15px; }
        .kpi-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .kpi-icon.blue { background: #e0f2fe; color: #0284c7; }
        .kpi-icon.green { background: #d1fae5; color: #059669; }
        .kpi-icon.red { background: #fee2e2; color: #dc2626; }
        .kpi-info h4 { margin: 0; font-size: 12px; color: #64748b; text-transform: uppercase; }
        .kpi-info h2 { margin: 5px 0 0; font-size: 24px; color: #1e293b; }

        .list-card { background: white; padding: 20px; border-radius: 16px; border: 1px solid #e2e8f0; box-shadow: var(--card-shadow); margin-bottom: 20px; }
        .list-card h3 { margin-top: 0; color: var(--secondary); display: flex; align-items: center; gap: 8px; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        
        .table-responsive { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { background: #f8fafc; padding: 12px; text-align: left; font-size: 12px; text-transform: uppercase; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; font-size: 13px; border-bottom: 1px solid #f1f5f9; vertical-align: middle; }

        .btn-action { padding: 6px 12px; border-radius: 6px; border: none; font-size: 11px; font-weight: bold; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 5px; color: white; background: #64748b; }
        .btn-action:hover { background: #475569; }

        .avatar-circle { width: 35px; height: 35px; border-radius: 50%; background: var(--primary-light); color: var(--primary); display: inline-flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; margin-right: 10px; }
        
        @media (max-width: 768px) {
            .dashboard-grid { grid-template-columns: 1fr; }
            .grid-listas { grid-template-columns: 1fr !important; }
        }

        /* Modal Comprovante */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(2px); }
        .modal-box { background: white; padding: 25px; border-radius: 16px; width: 90%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.2); animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <div id="global-header" class="header"></div>
        <div id="global-nav"></div>

        <div class="header-actions" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--secondary); margin:0;"><i class="fas fa-piggy-bank"></i> Caixinha ECO</h2>
        </div>

        <div class="tabs-container">
            <div class="tab-btn">Dashboard Público</div>
        </div>

        <div id="tab-dashboard" class="tab-content">
            <div class="dashboard-grid">
                <div class="kpi-card">
                    <div class="kpi-icon blue"><i class="fas fa-wallet"></i></div>
                    <div class="kpi-info"><h4>Saldo Total Atual</h4><h2 id="kpiSaldoTotal">R$ 0,00</h2></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon green"><i class="fas fa-hand-holding-usd"></i></div>
                    <div class="kpi-info"><h4>Arrecadado neste Mês</h4><h2 id="kpiArrecadadoMes">R$ 0,00</h2></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon red"><i class="fas fa-receipt"></i></div>
                    <div class="kpi-info"><h4>Despesas neste Mês</h4><h2 id="kpiDespesasMes">R$ 0,00</h2></div>
                </div>
            </div>

            <div class="grid-listas" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="list-card">
                    <h3><i class="fas fa-birthday-cake" style="color:#f59e0b;"></i> Aniversariantes do Mês</h3>
                    <div id="aniversariantesList" style="font-size:13px; color:#64748b;">Carregando...</div>
                </div>
                <div class="list-card">
                    <h3><i class="fas fa-history" style="color:#64748b;"></i> Últimas Despesas / Recibos</h3>
                    <div class="table-responsive">
                        <table id="ultimasDespesasTable">
                            <thead><tr><th>Data</th><th>Descrição</th><th>Valor</th><th>Comprovante</th></tr></thead>
                            <tbody><tr><td colspan="4" style="text-align:center;">Carregando...</td></tr></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="modalComprovante" class="modal-overlay">
        <div class="modal-box" style="text-align:center;">
            <h3 style="color:var(--secondary); margin-top:0;">Comprovante</h3>
            <div id="comprovanteView" style="margin-bottom:20px;"></div>
            <button class="btn btn-secondary" style="width:100%; padding:10px; border-radius:8px; border:none; cursor:pointer;" onclick="fecharModal('modalComprovante')">Fechar</button>
        </div>
    </div>

    <script>
        const MENSALIDADE = 10.00;
        let dbColabs = {};
        let dbPagamentos = {};
        let dbDespesas = {};

        document.addEventListener('DOMContentLoaded', async () => {
            initGlobal('caixinha', 'Caixinha ECO');
            await carregarDadosDB();
        });

        async function carregarDadosDB() {
            try {
                const [resColabs, resPags, resDesp] = await Promise.all([
                    fetch(`${API_BASE_URL}/caixinha_colabs`, { headers: API_HEADERS }),
                    fetch(`${API_BASE_URL}/caixinha_pagamentos`, { headers: API_HEADERS }),
                    fetch(`${API_BASE_URL}/caixinha_despesas`, { headers: API_HEADERS })
                ]);

                dbColabs = normalizeData(await resColabs.json());
                dbPagamentos = normalizeData(await resPags.json());
                dbDespesas = normalizeData(await resDesp.json());

                atualizarDashboard();
                renderUltimasDespesas();

            } catch (error) {
                console.error("Erro ao carregar dados da caixinha:", error);
            }
        }

        function atualizarDashboard() {
            const now = new Date();
            const mesAtualStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const mesAnoAniv = String(now.getMonth()+1).padStart(2,'0');

            let totalArrecadadoGeral = 0;
            let totalArrecadadoMes = 0;
            let totalDespesasGeral = 0;
            let totalDespesasMes = 0;

            // Soma Pagamentos
            Object.entries(dbPagamentos).forEach(([mesKey, dadosMes]) => {
                if(dadosMes && dadosMes.pagamentos) {
                    Object.values(dadosMes.pagamentos).forEach(status => {
                        if(status === 'pago') {
                            totalArrecadadoGeral += MENSALIDADE;
                            if(mesKey === mesAtualStr) totalArrecadadoMes += MENSALIDADE;
                        }
                    });
                }
            });

            // Soma Despesas
            Object.values(dbDespesas).forEach(d => {
                const val = parseFloat(d.valor || 0);
                totalDespesasGeral += val;
                if(d.data && d.data.startsWith(mesAtualStr)) {
                    totalDespesasMes += val;
                }
            });

            const saldoTotal = totalArrecadadoGeral - totalDespesasGeral;

            document.getElementById('kpiSaldoTotal').innerText = `R$ ${saldoTotal.toFixed(2).replace('.',',')}`;
            document.getElementById('kpiArrecadadoMes').innerText = `R$ ${totalArrecadadoMes.toFixed(2).replace('.',',')}`;
            document.getElementById('kpiDespesasMes').innerText = `R$ ${totalDespesasMes.toFixed(2).replace('.',',')}`;

            // Aniversariantes do Mês
            const anivs = Object.values(dbColabs).filter(c => c.data_aniversario && c.data_aniversario.split('/')[1] === mesAnoAniv);
            
            const listEl = document.getElementById('aniversariantesList');
            if(anivs.length === 0) {
                listEl.innerHTML = '<span style="font-style:italic;">Nenhum aniversariante neste mês.</span>';
            } else {
                listEl.innerHTML = anivs.map(c => `
                    <div style="display:flex; align-items:center; padding:10px 0; border-bottom:1px solid #f1f5f9;">
                        <div class="avatar-circle">${c.nome.charAt(0)}</div>
                        <div><strong style="color:var(--secondary);">${c.nome}</strong><br><small><i class="fas fa-calendar-day"></i> Dia ${c.data_aniversario.split('/')[0]}</small></div>
                    </div>
                `).join('');
            }
        }

        function renderUltimasDespesas() {
            const list = Object.values(dbDespesas).sort((a,b) => b.data.localeCompare(a.data));
            const tbodyUltimas = document.querySelector('#ultimasDespesasTable tbody');

            if(list.length === 0) {
                tbodyUltimas.innerHTML = '<tr><td colspan="4" style="text-align:center;">Nenhuma despesa.</td></tr>';
                return;
            }

            tbodyUltimas.innerHTML = list.slice(0, 5).map(d => {
                const dataBR = d.data.split('-').reverse().join('/');
                const btnComp = d.comprovante ? `<button class="btn-action" onclick="verComprovante('${d.id_firebase}')"><i class="fas fa-eye"></i></button>` : '-';
                return `<tr>
                    <td style="font-size:11px;">${dataBR}</td>
                    <td>${d.descricao}</td>
                    <td style="color:#dc2626; font-weight:bold;">R$ ${d.valor.replace('.',',')}</td>
                    <td>${btnComp}</td>
                </tr>`;
            }).join('');
        }

        function verComprovante(id) {
            const d = dbDespesas[id];
            if(!d || !d.comprovante) return;
            
            const view = document.getElementById('comprovanteView');
            if(d.comprovante.startsWith('data:image')) {
                view.innerHTML = `<img src="${d.comprovante}" style="max-width:100%; max-height:60vh; border-radius:8px;">`;
            } else {
                view.innerHTML = `<a href="${d.comprovante}" download="comprovante" class="btn btn-secondary" style="padding:10px; border-radius:8px; text-decoration:none; color:white; background:#64748b;"><i class="fas fa-download"></i> Baixar Arquivo</a>`;
            }
            
            document.getElementById('modalComprovante').style.display = 'flex';
        }

        function fecharModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function normalizeData(apiData) {
            if (!apiData) return {};
            const normalized = {};
            Object.entries(apiData).forEach(([key, val]) => {
                if (typeof val === 'string' && (val.startsWith('{') || val.startsWith('['))) {
                    try { normalized[key] = JSON.parse(val); } catch(e) { normalized[key] = val; }
                } else { normalized[key] = val; }
            });
            return normalized;
        }
    </script>
</body>
</html>
