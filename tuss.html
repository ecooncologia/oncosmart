<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela TUSS - ONCO SMART</title>
    
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>

    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>
    
    <style>
        .card { padding: 20px; border-radius: 12px; background: white; box-shadow: var(--card-shadow); }
        .badge-tuss { background: #E6FFFA; color: #047857; padding: 4px 8px; border-radius: 6px; font-weight: bold; font-family: monospace; }
        
        /* Ajuste fino do DataTables para combinar com seu site */
        .dataTables_wrapper .dataTables_filter input { border: 1px solid #E2E8F0; padding: 8px; border-radius: 8px; margin-bottom: 10px; width: 300px; }
        .tuss-table { width: 100% !important; border-radius: 8px; overflow: hidden; border: 1px solid #E2E8F0; }
        table.dataTable thead th { background: #00855B; color: white; border-bottom: none; padding: 15px; }
        table.dataTable tbody td { padding: 12px 15px; border-bottom: 1px solid #F1F5F9; font-size: 14px; }
        .dataTables_info, .dataTables_paginate { margin-top: 15px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="global-header" class="header"></div>
        <div id="global-nav"></div>

        <div class="card">
            <div class="card-header" style="border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom: 15px;">
                <span><i class="fas fa-search"></i> Consulta Tabela TUSS</span>
            </div>
            
            <div id="loading" style="text-align:center; padding: 50px;">
                <i class="fas fa-spinner fa-spin fa-3x" style="color: #00855B;"></i>
                <p style="margin-top: 15px; color: #666;">Carregando mais de 4.000 procedimentos...</p>
            </div>

            <table id="tabelaFinal" class="tuss-table display" style="display: none;">
                <thead>
                    <tr>
                        <th>Código TUSS</th>
                        <th>Procedimento / Exame</th>
                        <th>Tipo</th>
                    </tr>
                </thead>
                <tbody id="corpoTabela"></tbody>
            </table>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initGlobal('tuss', 'Tabela TUSS');
            carregarTUSS();
        });

        function carregarTUSS() {
            Papa.parse("tabela_tuss.csv", {
                download: true,
                header: true, // AQUI ESTÁ O SEGREDO: Lê pelo nome da coluna!
                skipEmptyLines: true,
                complete: function(results) {
                    const dados = results.data;
                    const tbody = document.getElementById('corpoTabela');
                    
                    let html = '';
                    dados.forEach(linha => {
                        // Usamos o nome exato da coluna da sua planilha
                        const codigo = linha.CD_PROCEDIMENTO_TUSS || linha.CD_PROCEDIMENTO || '---';
                        const descricao = linha.DS_PROC_EXAME || linha.DS_PROCEDIMENTO_TUSS || '';
                        const tipo = linha.DS_TIPO_UTIL || 'Geral';

                        if (descricao) {
                            html += `
                                <tr>
                                    <td><span class="badge-tuss">${codigo}</span></td>
                                    <td>${descricao}</td>
                                    <td><small>${tipo}</small></td>
                                </tr>
                            `;
                        }
                    });

                    tbody.innerHTML = html;
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('tabelaFinal').style.display = 'table';

                    // Ativa a busca, ordenação e paginação automática
                    $('#tabelaFinal').DataTable({
                        language: {
                            url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/pt-BR.json'
                        },
                        pageLength: 25,
                        order: [[1, 'asc']] // Ordena por descrição ao abrir
                    });
                }
            });
        }
    </script>
</body>
</html>
