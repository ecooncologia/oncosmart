<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel da Copa - ONCO SMART</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <style>
        body { background-color: #fafbfd; font-family: 'Segoe UI', system-ui, sans-serif; margin: 0; color: #1f2937; }
        .container { width: 100%; max-width: 1400px; margin: 0 auto; padding: 20px 40px; box-sizing: border-box; }
        
        /* Cabeçalho da Página */
        .dash-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 1px solid #f9fafb; flex-shrink: 0;}
        .dash-header-title h1 { margin: 0; font-size: 24px; color: #111827; font-weight: 800; display: flex; align-items: center; gap: 12px; }
        .dash-header-title p { margin: 6px 0 0; color: #6b7280; font-size: 14px; font-weight: 500; }
        .dash-header-title i { color: #00995D; }

        /* Abas Estilo ONCO SMART */
        .tabs-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #e5e7eb; padding-bottom: 0; }
        .tab-btn { padding: 12px 24px; border: none; background: none; font-weight: 700; color: #6b7280; cursor: pointer; border-bottom: 3px solid transparent; transition: 0.3s; font-size: 14px; }
        .tab-btn.active { color: #00995D; border-bottom: 3px solid #00995D; background: white; border-radius: 8px 8px 0 0; }
        .tab-btn:hover:not(.active) { color: #111827; }
        
        .tab-content { display: none; animation: fadeIn 0.3s; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Formulários e Inputs */
        .controls { background: white; padding: 20px; border-radius: 16px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-wrap: wrap; gap: 20px; align-items: flex-end; justify-content: space-between; border: 1px solid #f9fafb;}
        .controls-group { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; width: 100%;}
        
        .input-group { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 200px;}
        .label-title { font-size: 11px; font-weight: 800; color: #6b7280; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-field { padding: 10px 15px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; font-weight: 600; color: #374151; height: 42px; box-sizing: border-box; outline: none; transition: 0.2s; background: #f9fafb; width: 100%;}
        .input-field:focus { border-color: #00995D; background: #fff; box-shadow: 0 0 0 3px rgba(0, 153, 93, 0.1); }
        
        .btn-add { background: #00995D; color: white; border: none; padding: 0 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; display: flex; gap: 8px; align-items: center; height: 42px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0, 153, 93, 0.2); white-space: nowrap;}
        .btn-add:hover { background: #007a4a; transform: translateY(-2px); box-shadow: 0 6px 10px rgba(0, 153, 93, 0.3); }

        /* Grid de Pedidos e Estoque */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        /* Cards Modernos */
        .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05); border: 1px solid #f3f4f6; display: flex; flex-direction: column; gap: 15px; transition: 0.3s; position: relative; overflow: hidden;}
        .card:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); }
        
        /* Header do Card de Pedido */
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; padding-bottom: 12px; border-bottom: 1px dashed #e5e7eb; }
        .patient-info h3 { margin: 0 0 5px 0; font-size: 16px; color: #111827; font-weight: 800; }
        .patient-box { font-size: 11px; font-weight: 700; color: #0284c7; background: #e0f2fe; padding: 4px 8px; border-radius: 6px; display: inline-block; }
        .order-time { font-size: 11px; color: #6b7280; font-weight: 600; text-align: right;}
        
        /* Status Badges */
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; text-align: center; }
        .st-pending { background: #fee2e2; color: #b91c1c; }
        .st-preparing { background: #fef3c7; color: #d97706; }
        .st-ready { background: #e0f2fe; color: #0284c7; }
        .st-delivered { background: #dcfce7; color: #10b981; }

        /* Lista de Itens do Pedido */
        .order-items { flex: 1; display: flex; flex-direction: column; gap: 8px; font-size: 13px; color: #4b5563; font-weight: 500; }
        .order-items div { display: flex; align-items: center; gap: 8px; }
        .order-items i { color: #00995D; font-size: 10px; }

        /* Ações do Card de Pedido */
        .card-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: auto; }
        .btn-status { padding: 8px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 11px; font-weight: 700; cursor: pointer; transition: 0.2s; background: white; color: #4b5563;}
        .btn-status:hover { background: #f3f4f6; }
        
        .btn-status.action-pending:hover, .btn-status.action-pending.active { background: #fee2e2; border-color: #fca5a5; color: #b91c1c;}
        .btn-status.action-preparing:hover, .btn-status.action-preparing.active { background: #fef3c7; border-color: #fcd34d; color: #d97706;}
        .btn-status.action-ready:hover, .btn-status.action-ready.active { background: #e0f2fe; border-color: #7dd3fc; color: #0284c7;}
        .btn-status.action-delivered:hover, .btn-status.action-delivered.active { background: #dcfce7; border-color: #86efac; color: #10b981;}
        
        .btn-danger { grid-column: span 2; background: #fef2f2; color: #ef4444; border: 1px dashed #fca5a5; padding: 8px; border-radius: 8px; cursor: pointer; font-weight: 700; transition: 0.2s; font-size: 11px; }
        .btn-danger:hover { background: #ef4444; color: white; border-style: solid;}

        /* Imagem do Estoque */
        .stock-image { width: 100%; height: 140px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background: #f3f4f6; }
        
        /* Controles de Estoque */
        .stock-controls { display: flex; align-items: center; justify-content: space-between; background: #f9fafb; padding: 10px; border-radius: 8px; border: 1px solid #e5e7eb; }
        .stock-val { font-size: 20px; font-weight: 900; color: #00995D; }
        .stock-val.low { color: #ef4444; }
        
        .qty-actions { display: flex; align-items: center; gap: 5px; }
        .btn-qty { width: 32px; height: 32px; border-radius: 8px; border: none; background: white; border: 1px solid #d1d5db; color: #374151; font-weight: bold; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .btn-qty:hover { background: #00995D; color: white; border-color: #00995D;}

        .empty-state { grid-column: 1 / -1; padding: 60px 20px; text-align: center; color: #9ca3af; font-size: 16px; font-weight: 600; display: flex; flex-direction: column; align-items: center; gap: 15px; background: white; border-radius: 16px; border: 1px dashed #d1d5db;}
        .empty-state i { font-size: 48px; color: #e5e7eb; }

        /* Categorias do Estoque */
        .category-header { font-size: 18px; font-weight: 800; color: #1f2937; margin: 30px 0 15px 0; display: flex; align-items: center; gap: 10px; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px;}
        .category-header i { color: #00995D; }

    </style>
</head>
<body>
    <div class="container">
        <div id="global-header"></div>
        <div id="global-nav"></div>

        <div class="dash-header">
            <div class="dash-header-title">
                <h1><i class="fas fa-utensils"></i> Gestão de Copa & Nutrição</h1>
                <p>Controle de pedidos aos pacientes e gestão de estoque em tempo real</p>
            </div>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="openTab('pedidos_ativos')"><i class="fas fa-bell"></i> Pedidos Ativos</button>
            <button class="tab-btn" onclick="openTab('historico_pedidos')"><i class="fas fa-history"></i> Histórico</button>
            <button class="tab-btn" onclick="openTab('estoque_itens')"><i class="fas fa-boxes"></i> Estoque</button>
        </div>

        <div id="tab-pedidos_ativos" class="tab-content active">
            
            <div class="controls">
                <div class="controls-group">
                    <div class="input-group" style="flex: 2;">
                        <label class="label-title">Paciente</label>
                        <input type="text" id="orderPatient" class="input-field" placeholder="Nome do paciente...">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label class="label-title">Box/Leito</label>
                        <input type="text" id="orderBox" class="input-field" placeholder="Ex: Box 01">
                    </div>
                    <div class="input-group" style="flex: 2;">
                        <label class="label-title">Selecione o Item (Cardápio)</label>
                        <select id="orderItem" class="input-field">
                            <option value="">Carregando cardápio...</option>
                        </select>
                    </div>
                    <button class="btn-add" onclick="createOrder()">
                        <i class="fas fa-paper-plane"></i> Enviar Pedido
                    </button>
                </div>
            </div>

            <div class="grid-container" id="activeOrdersGrid">
                <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Carregando pedidos...</div>
            </div>
        </div>

        <div id="tab-historico_pedidos" class="tab-content">
            <div class="grid-container" id="historyOrdersGrid">
                <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Carregando histórico...</div>
            </div>
        </div>

        <div id="tab-estoque_itens" class="tab-content">
            
            <div class="controls">
                <div class="controls-group">
                    <div class="input-group" style="flex: 2;">
                        <label class="label-title">Nome do Item</label>
                        <input type="text" id="newItemName" class="input-field" placeholder="Ex: Sopa de Legumes">
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label class="label-title">Categoria</label>
                        <select id="newItemCategory" class="input-field">
                            <option value="Refeições">Refeições / Sopas</option>
                            <option value="Lanches">Lanches / Sanduíches</option>
                            <option value="Sobremesas">Frutas / Sobremesas</option>
                            <option value="Bebidas">Bebidas</option>
                            <option value="Insumos">Insumos (Apenas Estoque)</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex: 1;">
                        <label class="label-title">Qtd. Inicial</label>
                        <input type="number" id="newItemStock" class="input-field" value="10" min="0">
                    </div>
                    <div class="input-group" style="flex: 2;">
                        <label class="label-title">Detalhes / Ingredientes</label>
                        <input type="text" id="newItemDesc" class="input-field" placeholder="Ex: Sem sal, Integral...">
                    </div>
                    <button class="btn-add" onclick="createInventoryItem()">
                        <i class="fas fa-plus"></i> Cadastrar
                    </button>
                </div>
            </div>

            <div id="inventoryContainer">
                <div class="empty-state"><i class="fas fa-spinner fa-spin"></i> Carregando estoque...</div>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // VARIÁVEIS GLOBAIS E INICIALIZAÇÃO
        // ==========================================
        const API_ONCOFOOD_ORDERS = '/oncofood_pedidos';
        const API_ONCOFOOD_STOCK = '/oncofood_estoque';
        
        let loggedUser = "Sistema";
        let activeOrders = {};
        let historyOrders = {};
        let inventoryItems = {};

        function normalizeData(apiData) {
            if (!apiData) return {}; 
            const normalized = {};
            Object.entries(apiData).forEach(([key, val]) => {
                if (typeof val === 'string' && (val.startsWith('{') || val.startsWith('['))) { 
                    try { normalized[key] = JSON.parse(val); } catch(e) { normalized[key] = val; }
                } else { normalized[key] = val; }
            }); 
            return normalized;
        }

        function getLoggedUserName() {
            try {
                let uStr = localStorage.getItem('ecoUser');
                if(uStr) return JSON.parse(uStr).nome || "Sistema";
            } catch(e) {}
            return "Sistema";
        }

        // Função de Comunicação com a API
        async function apiFetch(endpoint, method = 'GET', bodyObj = null) {
            let options = { method, headers: API_HEADERS };
            if (bodyObj) options.body = JSON.stringify(bodyObj);
            
            const url = method === 'GET' ? `${API_BASE_URL}${endpoint}?t=${Date.now()}` : `${API_BASE_URL}${endpoint}`;
            const res = await fetch(url, options);
            
            if (!res.ok) throw new Error("Status " + res.status);
            if (method === 'GET') return normalizeData(await res.json());
            return await res.json();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            initGlobal('oncofood', 'Copa & Nutrição');
            loggedUser = getLoggedUserName();
            
            await loadInventory(); // Carrega o estoque primeiro para popular o select de pedidos
            await loadOrders();
        });

        function openTab(tabId) { 
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // ==========================================
        // LÓGICA DO ESTOQUE E CARDÁPIO
        // ==========================================
        async function loadInventory() {
            try { 
                inventoryItems = await apiFetch(API_ONCOFOOD_STOCK); 
            } catch(e) { 
                console.warn("Nenhum item de estoque encontrado.", e);
                inventoryItems = {}; 
            }
            renderInventory();
            populateOrderSelect();
        }

        function populateOrderSelect() {
            const sel = document.getElementById('orderItem');
            sel.innerHTML = '<option value="">-- Selecione o que deseja pedir --</option>';
            
            // Agrupa itens para o Select, omitindo 'Insumos' que não vão para pacientes
            Object.values(inventoryItems)
                .filter(i => i.categoria !== 'Insumos')
                .sort((a,b) => a.nome.localeCompare(b.nome))
                .forEach(i => {
                    const status = i.estoque <= 0 ? ' (ESGOTADO)' : '';
                    sel.add(new Option(`${i.nome}${status}`, i.id_firebase, false, i.estoque <= 0));
                });
        }

        async function createInventoryItem() {
            const nome = document.getElementById('newItemName').value.trim();
            const cat = document.getElementById('newItemCategory').value;
            const estoque = parseInt(document.getElementById('newItemStock').value) || 0;
            const desc = document.getElementById('newItemDesc').value.trim();

            if (!nome) return alert("Por favor, preencha o nome do item.");

            const newItem = {
                id_firebase: 'item_' + Date.now(),
                nome: nome,
                categoria: cat,
                estoque: estoque,
                descricao: desc,
                criado_por: loggedUser,
                data_criacao: new Date().toISOString()
            };

            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                await apiFetch(API_ONCOFOOD_STOCK, 'POST', newItem);
                
                // Limpa os campos
                document.getElementById('newItemName').value = '';
                document.getElementById('newItemDesc').value = '';
                document.getElementById('newItemStock').value = '10';
                
                await loadInventory();
            } catch (err) {
                alert("Erro ao cadastrar item: " + err.message);
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        async function updateStock(id, amount) {
            const item = inventoryItems[id];
            if (!item) return;

            let newStock = item.estoque + amount;
            if (newStock < 0) newStock = 0; // Não permite estoque negativo

            item.estoque = newStock;
            
            // Atualiza UI Imediatamente (Optimistic Update)
            const el = document.getElementById(`stock-val-${id}`);
            if(el) {
                el.innerText = newStock;
                el.className = newStock <= 3 ? 'stock-val low' : 'stock-val';
            }

            try {
                await apiFetch(`${API_ONCOFOOD_STOCK}/${id}`, 'PUT', item);
                populateOrderSelect(); // Atualiza os esgotados no select
            } catch(e) {
                console.error("Erro ao salvar estoque", e);
            }
        }

        async function deleteInventoryItem(id) {
            if (!confirm("Tem certeza que deseja excluir este item do cardápio/estoque?")) return;
            
            try {
                await apiFetch(`${API_ONCOFOOD_STOCK}/${id}`, 'DELETE');
                await loadInventory();
            } catch (e) {
                alert("Erro ao excluir: " + e.message);
            }
        }

        function renderInventory() {
            const container = document.getElementById('inventoryContainer');
            if (Object.keys(inventoryItems).length === 0) {
                container.innerHTML = '<div class="empty-state"><i class="fas fa-box-open"></i> O estoque está vazio. Cadastre novos itens acima.</div>';
                return;
            }

            // Agrupa por Categoria
            const grouped = {};
            Object.values(inventoryItems).forEach(i => {
                if (!grouped[i.categoria]) grouped[i.categoria] = [];
                grouped[i.categoria].push(i);
            });

            let html = '';
            
            const categoryIcons = {
                'Refeições': 'fas fa-utensils',
                'Lanches': 'fas fa-hamburger',
                'Sobremesas': 'fas fa-apple-alt',
                'Bebidas': 'fas fa-coffee',
                'Insumos': 'fas fa-cubes'
            };

            Object.keys(grouped).sort().forEach(cat => {
                const icon = categoryIcons[cat] || 'fas fa-box';
                html += `<div class="category-header"><i class="${icon}"></i> ${cat}</div>`;
                html += `<div class="grid-container">`;
                
                grouped[cat].sort((a,b) => a.nome.localeCompare(b.nome)).forEach(item => {
                    const isLow = item.estoque <= 3 ? 'low' : '';
                    html += `
                        <div class="card">
                            <h3 style="margin:0; font-size:16px; color:#111827; font-weight:800;">${item.nome}</h3>
                            <p style="margin:0; font-size:12px; color:#6b7280; min-height: 18px;">${item.descricao || 'Sem detalhes adic.'}</p>
                            
                            <div class="stock-controls">
                                <span style="font-size:12px; font-weight:700; color:#4b5563;">QTD DISPONÍVEL:</span>
                                <div class="qty-actions">
                                    <button class="btn-qty" onclick="updateStock('${item.id_firebase}', -1)"><i class="fas fa-minus"></i></button>
                                    <span class="stock-val ${isLow}" id="stock-val-${item.id_firebase}">${item.estoque}</span>
                                    <button class="btn-qty" onclick="updateStock('${item.id_firebase}', 1)"><i class="fas fa-plus"></i></button>
                                </div>
                            </div>
                            
                            <div style="text-align:right;">
                                <button class="btn-danger" style="width: auto; padding: 6px 12px; display:inline-block;" onclick="deleteInventoryItem('${item.id_firebase}')">Excluir Item</button>
                            </div>
                        </div>
                    `;
                });
                
                html += `</div>`;
            });

            container.innerHTML = html;
        }

        // ==========================================
        // LÓGICA DE PEDIDOS (COZINHA)
        // ==========================================
        async function loadOrders() {
            try {
                const allOrders = await apiFetch(API_ONCOFOOD_ORDERS);
                activeOrders = {};
                historyOrders = {};

                Object.values(allOrders).forEach(o => {
                    if (o.status === 'delivered') historyOrders[o.id_firebase] = o;
                    else activeOrders[o.id_firebase] = o;
                });
            } catch(e) {
                console.warn("Nenhum pedido encontrado.", e);
            }
            renderOrders();
        }

        async function createOrder() {
            const pac = document.getElementById('orderPatient').value.trim();
            const box = document.getElementById('orderBox').value.trim();
            const itemId = document.getElementById('orderItem').value;

            if (!pac || !itemId) return alert("Preencha o Paciente e selecione um Item.");
            
            const itemObj = inventoryItems[itemId];
            if (!itemObj) return alert("Item inválido.");

            if (itemObj.estoque <= 0) {
                if(!confirm(`O item ${itemObj.nome} está sem estoque no sistema. Deseja enviar o pedido assim mesmo?`)) return;
            }

            const newOrder = {
                id_firebase: 'pedido_' + Date.now(),
                paciente: pac,
                leito: box || 'Não inf.',
                itens: [{ id: itemId, nome: itemObj.nome, qtd: 1 }], // Suporte futuro para múltiplos itens
                status: 'pending',
                solicitado_por: loggedUser,
                data_solicitacao: new Date().toISOString()
            };

            const btn = event.currentTarget;
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
            btn.disabled = true;

            try {
                // Salva o pedido
                await apiFetch(API_ONCOFOOD_ORDERS, 'POST', newOrder);
                
                // Dá baixa automática de 1 unidade no estoque
                await updateStock(itemId, -1);
                
                // Limpa tela
                document.getElementById('orderPatient').value = '';
                document.getElementById('orderBox').value = '';
                document.getElementById('orderItem').value = '';
                
                await loadOrders();
            } catch(err) {
                alert("Erro ao enviar pedido: " + err.message);
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        async function updateOrderStatus(id, newStatus) {
            let order = activeOrders[id];
            if (!order) return;

            order.status = newStatus;
            order.data_atualizacao = new Date().toISOString();

            try {
                await apiFetch(`${API_ONCOFOOD_ORDERS}/${id}`, 'PUT', order);
                await loadOrders(); // Recarrega para mover as coisas se foi 'delivered'
            } catch(e) {
                alert("Erro ao atualizar status: " + e.message);
            }
        }

        async function deleteOrder(id) {
            if (!confirm("Tem certeza que deseja excluir este pedido?\nEle desaparecerá da tela da Copa.")) return;
            try {
                await apiFetch(`${API_ONCOFOOD_ORDERS}/${id}`, 'DELETE');
                await loadOrders();
            } catch(e) {
                alert("Erro ao excluir: " + e.message);
            }
        }

        function getStatusInfo(status) {
            const map = {
                'pending': { label: 'Pendente', class: 'st-pending' },
                'preparing': { label: 'Preparando', class: 'st-preparing' },
                'ready': { label: 'Pronto p/ Entrega', class: 'st-ready' },
                'delivered': { label: 'Entregue', class: 'st-delivered' }
            };
            return map[status] || { label: status, class: 'st-pending' };
        }

        function formatTime(isoString) {
            if (!isoString) return '--:--';
            const d = new Date(isoString);
            return d.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
        }

        function formatDate(isoString) {
            if (!isoString) return '--/--/----';
            const d = new Date(isoString);
            return d.toLocaleDateString('pt-BR');
        }

        function generateOrderCard(o, isHistory = false) {
            const st = getStatusInfo(o.status);
            
            let itemsHtml = '';
            (o.itens || []).forEach(it => {
                itemsHtml += `<div><i class="fas fa-chevron-right"></i> ${it.qtd}x ${it.nome}</div>`;
            });

            let actionsHtml = '';
            if (!isHistory) {
                const isPend = o.status === 'pending' ? 'active' : '';
                const isPrep = o.status === 'preparing' ? 'active' : '';
                const isRead = o.status === 'ready' ? 'active' : '';
                const isDelv = o.status === 'delivered' ? 'active' : '';

                actionsHtml = `
                    <div class="card-actions">
                        <button class="btn-status action-pending ${isPend}" onclick="updateOrderStatus('${o.id_firebase}', 'pending')">Pendente</button>
                        <button class="btn-status action-preparing ${isPrep}" onclick="updateOrderStatus('${o.id_firebase}', 'preparing')">Preparando</button>
                        <button class="btn-status action-ready ${isRead}" onclick="updateOrderStatus('${o.id_firebase}', 'ready')">Pronto</button>
                        <button class="btn-status action-delivered ${isDelv}" onclick="updateOrderStatus('${o.id_firebase}', 'delivered')"><i class="fas fa-check"></i> Entregue</button>
                        
                        <button class="btn-danger" onclick="deleteOrder('${o.id_firebase}')"><i class="fas fa-trash"></i> Cancelar Pedido</button>
                    </div>
                `;
            } else {
                actionsHtml = `
                    <div style="font-size: 11px; color: #6b7280; text-align: center; margin-top: 10px; border-top: 1px dashed #e5e7eb; padding-top: 10px;">
                        Entregue em: ${formatDate(o.data_atualizacao)} às ${formatTime(o.data_atualizacao)}
                    </div>
                `;
            }

            return `
                <div class="card">
                    <div class="card-header">
                        <div class="patient-info">
                            <h3>${o.paciente}</h3>
                            <div class="patient-box"><i class="fas fa-bed"></i> ${o.leito}</div>
                        </div>
                        <div style="display:flex; flex-direction:column; align-items:flex-end; gap:5px;">
                            <span class="status-badge ${st.class}">${st.label}</span>
                            <span class="order-time"><i class="far fa-clock"></i> ${formatTime(o.data_solicitacao)}</span>
                        </div>
                    </div>
                    
                    <div class="order-items">
                        ${itemsHtml}
                    </div>

                    ${actionsHtml}
                </div>
            `;
        }

        function renderOrders() {
            // ATIVOS
            const activeContainer = document.getElementById('activeOrdersGrid');
            const activeArr = Object.values(activeOrders).sort((a,b) => {
                // Ordena por prioridade de status e depois por data
                const statusWeight = { 'pending': 1, 'preparing': 2, 'ready': 3 };
                const wA = statusWeight[a.status] || 9;
                const wB = statusWeight[b.status] || 9;
                if (wA !== wB) return wA - wB;
                return new Date(b.data_solicitacao) - new Date(a.data_solicitacao);
            });

            if (activeArr.length === 0) {
                activeContainer.innerHTML = '<div class="empty-state"><i class="fas fa-mug-hot"></i> Nenhum pedido ativo na copa no momento.</div>';
            } else {
                activeContainer.innerHTML = activeArr.map(o => generateOrderCard(o, false)).join('');
            }

            // HISTÓRICO
            const historyContainer = document.getElementById('historyOrdersGrid');
            const historyArr = Object.values(historyOrders).sort((a,b) => new Date(b.data_atualizacao) - new Date(a.data_atualizacao));

            if (historyArr.length === 0) {
                historyContainer.innerHTML = '<div class="empty-state"><i class="fas fa-history"></i> Nenhum histórico de pedidos finalizados.</div>';
            } else {
                // Mostra apenas os últimos 50 no histórico para não pesar a tela
                historyContainer.innerHTML = historyArr.slice(0, 50).map(o => generateOrderCard(o, true)).join('');
            }
        }
    </script>
</body>
</html>
