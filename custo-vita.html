<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custo Operação VITA - ONCO SMART</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <style>
        .tabs-nav { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0; }
        .tab-btn { padding: 12px 20px; border: 1px solid #e2e8f0; border-bottom: none; font-weight: 700; color: #64748b; cursor: pointer; border-radius: 10px 10px 0 0; transition: 0.3s; font-size: 13px; background: #f8fafc; }
        .tab-btn.active { color: var(--primary); border-top: 4px solid var(--primary); background: white; margin-bottom: -2px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .filter-bar { display: flex; gap: 15px; align-items: flex-end; flex-wrap: wrap; margin-bottom: 20px; background: white; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; }
        
        .transport-section { margin-top: 30px; border-top: 2px dashed #cbd5e1; padding-top: 20px; }
        .badge-faturamento { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        
        .manual-form { display: flex; gap: 10px; align-items: flex-end; background: #f1f5f9; padding: 15px; border-radius: 8px; margin-bottom: 15px; }

        #table-tasy-vita th, #table-tasy-vita td { font-size: 13px; padding: 12px 10px; white-space: nowrap; }
        
        /* ESTILOS DO ACORDEÃO (LINHAS EM CASCATA) */
        .parent-row { cursor: pointer; transition: background 0.2s; }
        .parent-row:hover { background-color: var(--primary-light) !important; }
        .icon-expand { width: 20px; transition: transform 0.3s ease; color: var(--primary); text-align: center; }
        .icon-expand.open { transform: rotate(90deg); }
        
        .child-row { background-color: #f8fafc; }
        .sub-table-container { padding: 15px 25px 25px 40px; border-bottom: 2px solid var(--primary-soft); box-shadow: inset 0 3px 6px rgba(0,0,0,0.02); }
        .sub-table { width: 100%; border-collapse: collapse; background: white; border: 1px solid #cbd5e1; border-radius: 8px; overflow: hidden; }
        .sub-table th { background: #e2e8f0; padding: 8px 12px; font-size: 11px; color: #475569; text-transform: uppercase; }
        .sub-table td { padding: 8px 12px; font-size: 12px; border-bottom: 1px solid #f1f5f9; }
        .sub-table tr:last-child td { border-bottom: none; }
        .sub-table tr:hover td { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div class="container">
        <div id="global-header"></div>
        <div id="global-nav"></div>

        <div class="header-center" style="margin-bottom: 25px;">
            <p><i class="fas fa-hand-holding-usd"></i> Custo Operação VITA</p>
        </div>

        <div class="tabs-nav">
            <button class="tab-btn active" onclick="switchTab('custo-vita', this)">Custo somente VITA</button>
            <button class="tab-btn" onclick="switchTab('contas-faturadas', this)">Contas Faturadas</button>
        </div>

        <div id="custo-vita" class="tab-content active">
            <div class="filter-bar">
                <div class="col">
                    <label class="card-label">Mês de Referência</label>
                    <input type="month" id="filter-mes" class="form-control" onchange="loadCustoVita()">
                </div>
                <div class="col">
                    <label class="card-label">Paciente</label>
                    <input type="text" id="filter-paciente" class="form-control" placeholder="Buscar paciente..." onkeyup="filterTable()">
                </div>
                <button class="btn btn-success" onclick="loadCustoVita()"><i class="fas fa-sync"></i> Atualizar Dados</button>
            </div>

            <div class="card">
                <div class="card-header"><i class="fas fa-file-invoice-dollar"></i> Relatório Agrupado (VITA)</div>
                <div class="table-container">
                    <table id="table-tasy-vita">
                        <thead>
                            <tr>
                                <th style="width: 40px; text-align: center;"><i class="fas fa-list"></i></th>
                                <th>Data Atend.</th>
                                <th>Nº Prescrição</th>
                                <th>Paciente</th>
                                <th style="text-align: center;">Itens</th>
                                <th style="text-align: right;">Custo Total</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-custo-vita">
                            </tbody>
                    </table>
                </div>
            </div>

            <div class="transport-section">
                <div class="card">
                    <div class="card-header"><i class="fas fa-truck-loading"></i> Transporte (Inserção Manual)</div>
                    
                    <div class="manual-form">
                        <div style="flex: 1;">
                            <label class="card-label">Data do Transporte</label>
                            <input type="date" id="transp-data" class="form-control">
                        </div>
                        <div style="flex: 1;">
                            <label class="card-label">Valor do Transporte</label>
                            <input type="number" id="transp-valor" class="form-control" placeholder="0.00" step="0.01">
                        </div>
                        <button class="btn btn-primary" onclick="addTransporte()"><i class="fas fa-plus"></i> Adicionar</button>
                    </div>

                    <div class="table-container">
                        <table id="table-transporte">
                            <thead>
                                <tr>
                                    <th>Data</th>
                                    <th>Valor (R$)</th>
                                    <th style="width: 100px;">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="tbody-transporte">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <div id="contas-faturadas" class="tab-content">
            <div class="card">
                <div class="card-header"><i class="fas fa-check-double"></i> Relatório de Contas Faturadas</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Paciente</th>
                                <th>Data</th>
                                <th>Nº Conta</th>
                                <th>Valor (R$)</th>
                            </tr>
                        </thead>
                        <tbody id="tbody-contas-faturadas">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let dataCustoVita = [];
        let dataTransporte = [];
        let dataContas = [];

        async function initPage() {
            if (typeof initGlobal !== 'undefined') {
                initGlobal('custo-vita', 'Custo Operação VITA');
                
                const now = new Date();
                document.getElementById('filter-mes').value = now.toISOString().substring(0, 7);
                
                await loadCustoVita();
                await loadContasFaturadas();
                loadTransporteLocal(); 
            } else {
                setTimeout(initPage, 100);
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);

        function switchTab(tabId, btn) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            btn.classList.add('active');
        }

        // ==========================================
        // FUNÇÕES DE FORMATAÇÃO
        // ==========================================
        function formatCurrency(valor) {
            let num = parseFloat(valor || 0);
            if (isNaN(num)) num = 0;
            return num.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function formatDose(valor) {
            let num = parseFloat(valor || 0);
            if (isNaN(num)) num = 0;
            return num.toLocaleString('pt-BR', { maximumFractionDigits: 2 });
        }

        function formatDate(dateStr) {
            if(!dateStr) return '-';
            const d = new Date(dateStr);
            if(isNaN(d.getTime())) return dateStr; 
            return d.toLocaleDateString('pt-BR', {timeZone: 'UTC'});
        }

        // ==========================================
        // LÓGICA DO ACORDEÃO / CASCADE
        // ==========================================
        function toggleGroup(groupId) {
            const childRow = document.getElementById(`child-${groupId}`);
            const icon = document.getElementById(`icon-${groupId}`);
            
            if (childRow.style.display === 'none') {
                childRow.style.display = 'table-row';
                icon.classList.add('open');
            } else {
                childRow.style.display = 'none';
                icon.classList.remove('open');
            }
        }

        // ==========================================
        // CARREGAMENTO E RENDERIZAÇÃO
        // ==========================================
        async function loadCustoVita() {
            const mes = document.getElementById('filter-mes').value;
            const tbody = document.getElementById('tbody-custo-vita');
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center"><i class="fas fa-spinner fa-spin"></i> Buscando dados no banco Tasy...</td></tr>';

            try {
                const res = await fetch(`${API_BASE_URL}/view_vita?mes=${mes}`, { headers: API_HEADERS });
                if(res.ok) {
                    const data = await res.json();
                    dataCustoVita = Object.values(data);
                    renderTableVita(dataCustoVita);
                } else {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Nenhum dado encontrado para este mês.</td></tr>';
                }
            } catch (e) {
                console.error("Erro ao buscar dados do Tasy:", e);
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:red">Erro ao conectar com a API do Tasy. Verifique o servidor.</td></tr>';
            }
        }

        function renderTableVita(list) {
            const tbody = document.getElementById('tbody-custo-vita');
            tbody.innerHTML = '';

            if(list.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">Nenhum registro encontrado no filtro.</td></tr>';
                return;
            }

            // 1. AGRUPAMENTO POR DATA E PACIENTE
            const grupos = {};
            
            list.forEach(item => {
                const dataAtend = item.dt_atendimento || item.DT_ATENDIMENTO;
                const paciente = (item.nm_pessoa_fisica || item.NM_PESSOA_FISICA || '-').toUpperCase();
                const nrPrescricao = item.nr_prescricao || item.NR_PRESCRICAO || '-';
                const dataFmt = formatDate(dataAtend);
                
                // Chave única para o grupo (Paciente + Data)
                const groupKey = `${paciente}_${dataFmt}`;
                
                if(!grupos[groupKey]) {
                    grupos[groupKey] = {
                        paciente: paciente,
                        data: dataFmt,
                        nrPrescricao: nrPrescricao,
                        totalCusto: 0,
                        itens: []
                    };
                }
                
                const custoTotalItem = parseFloat(item.vl_custo_total_manip || item.VL_CUSTO_TOTAL_MANIP || 0);
                grupos[groupKey].totalCusto += custoTotalItem;
                grupos[groupKey].itens.push(item);
            });

            // 2. RENDERIZAÇÃO DOS GRUPOS E SUB-TABELAS
            let index = 0;
            for (const key in grupos) {
                const g = grupos[key];
                const groupId = `grp_${index}`;
                index++;

                // LINHA PAI (Resumo)
                tbody.innerHTML += `
                    <tr class="parent-row" onclick="toggleGroup('${groupId}')">
                        <td style="text-align: center;"><i class="fas fa-chevron-right icon-expand" id="icon-${groupId}"></i></td>
                        <td>${g.data}</td>
                        <td>${g.nrPrescricao}</td>
                        <td style="font-weight: 600;">${g.paciente}</td>
                        <td style="text-align: center;"><span class="badge badge-neutral">${g.itens.length} itens</span></td>
                        <td style="text-align: right; font-weight: 800; color: #00855B;">R$ ${formatCurrency(g.totalCusto)}</td>
                    </tr>
                `;

                // LINHA FILHA (Sub-tabela oculta)
                let childRowsHTML = '';
                g.itens.forEach(item => {
                    const matConta = item.ds_material_conta || item.DS_MATERIAL_CONTA || '-';
                    const material = item.ds_material || item.DS_MATERIAL || '-';
                    const dose = formatDose(item.qt_dose_cabine || item.QT_DOSE_CABINE);
                    const custoAntigo = formatCurrency(item.custo_antigo || item.CUSTO_ANTIGO);
                    const custoUnit = formatCurrency(item.vl_custo_unitario_manip || item.VL_CUSTO_UNITARIO_MANIP);
                    const custoTotal = formatCurrency(item.vl_custo_total_manip || item.VL_CUSTO_TOTAL_MANIP);

                    childRowsHTML += `
                        <tr>
                            <td>${matConta}</td>
                            <td>${material}</td>
                            <td style="text-align: center;">${dose}</td>
                            <td style="color: #94a3b8;">R$ ${custoAntigo}</td>
                            <td>R$ ${custoUnit}</td>
                            <td style="font-weight: bold;">R$ ${custoTotal}</td>
                        </tr>
                    `;
                });

                tbody.innerHTML += `
                    <tr id="child-${groupId}" class="child-row" style="display: none;">
                        <td colspan="6" style="padding: 0;">
                            <div class="sub-table-container">
                                <table class="sub-table">
                                    <thead>
                                        <tr>
                                            <th>Material Conta</th>
                                            <th>Medicação</th>
                                            <th style="text-align: center;">Dose Cabine</th>
                                            <th>Custo Antigo</th>
                                            <th>Custo Unit. Manip</th>
                                            <th>Custo Total Manip</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        ${childRowsHTML}
                                    </tbody>
                                </table>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        // ==========================================
        // DEMAIS FUNÇÕES (Contas, Transporte, Filtros)
        // ==========================================
        async function loadContasFaturadas() {
            const tbody = document.getElementById('tbody-contas-faturadas');
            try {
                const res = await fetch(`${API_BASE_URL}/contas_faturadas`, { headers: API_HEADERS });
                if(!res.ok) return;
                const data = await res.json();
                dataContas = Object.values(data);
                
                tbody.innerHTML = '';
                if(dataContas.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Nenhuma conta faturada.</td></tr>';
                    return;
                }

                dataContas.forEach(c => {
                    const paciente = c.paciente || c.PACIENTE || '-';
                    const dataC = c.data || c.DATA;
                    const numConta = c.num_conta || c.NUM_CONTA || '-';
                    const valorC = formatCurrency(c.valor || c.VALOR);

                    tbody.innerHTML += `
                        <tr>
                            <td style="font-weight: 600;">${paciente.toUpperCase()}</td>
                            <td>${formatDate(dataC)}</td>
                            <td><span class="badge-faturamento fat-vita" style="font-size: 11px;"># ${numConta}</span></td>
                            <td style="font-weight: bold;">R$ ${valorC}</td>
                        </tr>
                    `;
                });
            } catch (e) {
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center">Erro ao carregar contas.</td></tr>';
            }
        }

        function addTransporte() {
            const data = document.getElementById('transp-data').value;
            const valor = document.getElementById('transp-valor').value;

            if(!data || !valor) return alert("Preencha data e valor do transporte!");

            const valorLimpo = parseFloat(valor.replace(',', '.'));

            const novo = { id: Date.now(), data, valor: valorLimpo };
            dataTransporte.push(novo);
            
            saveTransporte(novo);
            
            renderTransporte();
            document.getElementById('transp-data').value = '';
            document.getElementById('transp-valor').value = '';
        }

        function renderTransporte() {
            const tbody = document.getElementById('tbody-transporte');
            tbody.innerHTML = '';
            
            if(dataTransporte.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#64748b;">Nenhum transporte cadastrado.</td></tr>';
                return;
            }

            dataTransporte.sort((a,b) => new Date(b.data) - new Date(a.data)).forEach(t => {
                const valorFormatado = formatCurrency(t.valor); 
                
                tbody.innerHTML += `
                    <tr>
                        <td>${formatDate(t.data)}</td>
                        <td style="font-weight:bold;">R$ ${valorFormatado}</td>
                        <td>
                            <button class="btn-icon danger" onclick="deleteTransporte(${t.id})"><i class="fas fa-trash"></i></button>
                        </td>
                    </tr>
                `;
            });
        }

        async function saveTransporte(item) {
            try {
                await fetch(`${API_BASE_URL}/custo_vita_transporte`, {
                    method: 'POST',
                    headers: API_HEADERS,
                    body: JSON.stringify(item)
                });
            } catch(e) { console.error(e); }
        }

        async function deleteTransporte(id) {
            if(!confirm("Tem certeza que deseja excluir este transporte?")) return;
            try {
                await fetch(`${API_BASE_URL}/custo_vita_transporte/${id}`, { method: 'DELETE', headers: API_HEADERS });
                dataTransporte = dataTransporte.filter(t => t.id !== id);
                renderTransporte();
            } catch(e) { console.error(e); }
        }

        async function loadTransporteLocal() {
            try {
                const res = await fetch(`${API_BASE_URL}/custo_vita_transporte`, { headers: API_HEADERS });
                if(res.ok) {
                    const data = await res.json();
                    dataTransporte = Object.values(data);
                    renderTransporte();
                }
            } catch(e) { console.error(e); }
        }

        function filterTable() {
            const term = document.getElementById('filter-paciente').value.toUpperCase();
            
            const filtered = dataCustoVita.filter(item => {
                const nome = (item.nm_pessoa_fisica || item.NM_PESSOA_FISICA || '').toUpperCase();
                return nome.includes(term);
            });
            
            renderTableVita(filtered);
        }
    </script>
</body>
</html>
