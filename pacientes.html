<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pacientes - ECO Sistema</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { width: 100%; padding: 20px; box-sizing: border-box; }
        
        .controls { background: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        
        .input-group { margin-bottom: 0; display: flex; flex-direction: column; }
        .input-field { padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; height: 38px; box-sizing: border-box; min-width: 250px; }
        
        .btn-primary { background: #00995D; color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; gap: 8px; align-items: center; height: 38px; transition: 0.2s; }
        .btn-primary:hover { background: #007a4a; }
        
        .btn-sync { background: #4b5563; color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: 600; height: 38px; transition: 0.2s; }
        .btn-sync:hover { background: #374151; }

        .sheet-container { background: white; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); overflow: hidden; padding-bottom: 10px; }
        .table-responsive { overflow-x: auto; background: white; padding-bottom: 10px; max-height: 700px; }
        .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
        .data-table th { background: #00995D; color: white; padding: 12px; text-align: left; position: sticky; top: 0; z-index: 10; }
        .data-table td { padding: 12px; border-bottom: 1px solid #eee; color: #333; vertical-align: middle; }
        
        /* Badges de Status */
        .badge { padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 11px; display: inline-block; text-align: center; }
        .bg-new { background: #fef08a; color: #854d0e; border: 1px solid #fde047; animation: pulse 2s infinite; }
        .bg-linked { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .bg-inactive { background: #e5e7eb; color: #4b5563; border: 1px solid #d1d5db; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* Botões de Ação na Tabela */
        .actions-cell { display: flex; justify-content: center; gap: 8px; }
        .btn-icon { width: 32px; height: 32px; border-radius: 6px; border: 1px solid #e5e7eb; background: white; color: #4b5563; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-icon:hover { background: #f3f4f6; color: #1f2937; }
        .btn-icon-link:hover { background: #e0f2fe; color: #0284c7; border-color: #bae6fd; }
        .btn-icon-edit:hover { background: #fef3c7; color: #ca8a04; border-color: #fde68a; }
        .btn-icon-ban:hover { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
        .btn-icon-danger { color: #dc2626; border-color: #fca5a5; background: #fff5f5; }
        .btn-icon-danger:hover { background: #dc2626; color: white; }

        /* Modais */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(2px); }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; width: 400px; max-width: 90%; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); overflow: hidden; }
        .modal-header { background: #00995D; color: white; padding: 15px 20px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        .modal-close { background: none; border: none; color: white; font-size: 18px; cursor: pointer; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 15px 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px; background: #f9fafb; }
        
        .form-label { font-weight: bold; font-size: 12px; color: #4b5563; margin-bottom: 5px; display: block; }
        .form-select, .form-textarea { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 13px; margin-bottom: 15px; box-sizing: border-box; }
        .form-textarea { resize: vertical; min-height: 80px; }
        .helper-text { font-size: 11px; color: #6b7280; margin-top: -10px; margin-bottom: 15px; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <div id="global-header" class="header"></div>
        <div id="global-nav"></div>

        <div class="controls">
            <div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
                <div class="input-group">
                    <input type="text" id="searchPatient" class="input-field" placeholder="Buscar paciente..." onkeyup="filterTable()">
                </div>
                <div class="input-group">
                    <select id="filterStatus" class="input-field" onchange="filterTable()" style="min-width: 150px;">
                        <option value="ativos">Todos os Ativos</option>
                        <option value="novo">Somente Novos (Sem Médico)</option>
                        <option value="vinculado">Vinculados (Com Médico)</option>
                        <option value="inativo">Inativos</option>
                        <option value="all">Ver Absolutamente Todos</option>
                    </select>
                </div>
            </div>
            
            <div style="display: flex; gap: 10px; align-items: center;">
                <span id="syncIndicator" style="font-size: 12px; color: #6b7280; display: none;">
                    <i class="fas fa-sync-alt fa-spin"></i> Buscando novos na Unimed...
                </span>
                <button class="btn-primary" onclick="openAddModal()">
                    <i class="fas fa-user-plus"></i> Novo Paciente Manual
                </button>
            </div>
        </div>

        <div class="sheet-container">
            <div class="table-responsive">
                <table class="data-table" id="patientsTable">
                    <thead>
                        <tr>
                            <th style="width: 35%">Nome do Paciente</th>
                            <th style="width: 15%; text-align: center;">Status</th>
                            <th style="width: 30%">Médico Responsável</th>
                            <th style="width: 20%; text-align: center;">Ações</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="4" style="text-align:center; padding: 40px;"><i class="fas fa-spinner fa-spin"></i> Carregando pacientes...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addEditModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="addEditModalTitle">Adicionar Paciente</span>
                <button class="modal-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editPatientId">
                <label class="form-label">Nome Completo</label>
                <input type="text" id="patientNameInput" class="form-select" placeholder="Ex: JOÃO DA SILVA" style="text-transform: uppercase;">
            </div>
            <div class="modal-footer">
                <button class="btn-sync" style="background: #9ca3af;" onclick="closeModals()">Cancelar</button>
                <button class="btn-primary" onclick="savePatient()">Salvar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="linkModal">
        <div class="modal-content">
            <div class="modal-header">
                <span>Vincular Médico</span>
                <button class="modal-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Paciente: <strong id="linkPatientName" style="color: #000;"></strong></p>
                <input type="hidden" id="linkPatientId">
                
                <label class="form-label">Selecione o Médico Responsável</label>
                <select id="linkDoctorSelect" class="form-select">
                    <option value="">-- Selecione --</option>
                </select>
            </div>
            <div class="modal-footer">
                <button class="btn-sync" style="background: #9ca3af;" onclick="closeModals()">Cancelar</button>
                <button class="btn-primary" onclick="saveDoctorLink()">Confirmar Vínculo</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="inactivateModal">
        <div class="modal-content">
            <div class="modal-header" style="background: #dc2626;">
                <span>Inativar Paciente</span>
                <button class="modal-close" onclick="closeModals()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Paciente: <strong id="inactivatePatientName" style="color: #000;"></strong></p>
                <input type="hidden" id="inactivatePatientId">
                
                <label class="form-label">Motivo da Inativação (Obrigatório)</label>
                <textarea id="inactivateReason" class="form-textarea" placeholder="Ex: Paciente transferido, óbito, fim do tratamento..."></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-sync" style="background: #9ca3af;" onclick="closeModals()">Cancelar</button>
                <button class="btn-primary" style="background: #dc2626;" onclick="saveInactivation()">Confirmar Inativação</button>
            </div>
        </div>
    </div>

    <script>
        let patients = {};
        let doctors = {};

        // 🛡️ O Gerador de ID Blindado (Garante que nunca duplique)
        const generatePatientId = (name) => {
            return 'pac_' + String(name).normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, '').toLowerCase();
        };

        document.addEventListener('DOMContentLoaded', async () => {
            initGlobal('pacientes', 'Gestão de Pacientes');
            await loadDoctors();
            await loadPatients();
            
            // 🚀 Sincronização Invisível (Auto-Sync)
            autoSyncUnimedPatients();
        });

        // ==========================================
        // 1. CARREGAMENTO DE DADOS (READ)
        // ==========================================
        async function loadDoctors() {
            try {
                const res = await fetch(`${API_BASE_URL}/medicos`, { headers: API_HEADERS });
                if(res.ok) {
                    doctors = normalizeData(await res.json());
                    const select = document.getElementById('linkDoctorSelect');
                    Object.entries(doctors).sort((a,b) => (a[1].nome || '').localeCompare(b[1].nome || '')).forEach(([id, doc]) => {
                        select.add(new Option(doc.nome, id));
                    });
                }
            } catch(e) {}
        }

        async function loadPatients() {
            const tbody = document.querySelector('#patientsTable tbody');
            try {
                const res = await fetch(`${API_BASE_URL}/pacientes`, { headers: API_HEADERS });
                if(res.ok) patients = normalizeData(await res.json());
                else patients = {};
                renderTable();
            } catch(e) { 
                tbody.innerHTML = '<tr><td colspan="4" style="text-align:center; color:red;">Erro ao conectar com o banco de pacientes.</td></tr>';
            }
        }

        // ==========================================
        // 2. SINCRONIZAÇÃO INVISÍVEL COM UNIMED
        // ==========================================
        async function autoSyncUnimedPatients() {
            const indicator = document.getElementById('syncIndicator');
            indicator.style.display = 'inline-block';

            try {
                const resUnimed = await fetch(`${API_BASE_URL}/repasse_unimed`, { headers: API_HEADERS });
                if (!resUnimed.ok) return;
                
                const unimedData = normalizeData(await resUnimed.json());
                const unimedArray = Object.values(unimedData);
                let novosEncontrados = false;

                for (const row of unimedArray) {
                    if (row.paciente) {
                        const patName = String(row.paciente).toUpperCase().trim();
                        const patId = generatePatientId(patName);

                        // Se o paciente não existe na base, cadastra silenciosamente
                        if (!patients[patId]) {
                            const newPat = {
                                id_firebase: patId,
                                nome: patName,
                                doctor_id: "",
                                status: "ativo",
                                data_criacao: new Date().toISOString()
                            };
                            
                            await fetch(API_BASE_URL + '/pacientes', {
                                method: 'POST', headers: API_HEADERS, body: JSON.stringify(newPat)
                            });
                            
                            patients[patId] = newPat;
                            novosEncontrados = true;
                        }
                    }
                }

                // Se achou pacientes novos, atualiza a tela para eles aparecerem
                if(novosEncontrados) renderTable();

            } catch(e) {
                console.error("Erro na auto-sincronização", e);
            } finally {
                indicator.style.display = 'none';
            }
        }

        // ==========================================
        // 3. RENDERIZAÇÃO DA TABELA
        // ==========================================
        function renderTable() {
            const tbody = document.querySelector('#patientsTable tbody');
            const searchTerm = document.getElementById('searchPatient').value.toUpperCase();
            const filterStatus = document.getElementById('filterStatus').value;

            const patArray = Object.values(patients).sort((a,b) => a.nome.localeCompare(b.nome));
            let html = '';

            patArray.forEach(p => {
                const isInactive = p.status === 'inativo';
                const hasDoctor = p.doctor_id && p.doctor_id !== "";

                // Lógica dos Filtros
                if (searchTerm && !p.nome.includes(searchTerm)) return;
                if (filterStatus === 'ativos' && isInactive) return;
                if (filterStatus === 'inativo' && !isInactive) return;
                if (filterStatus === 'novo' && (hasDoctor || isInactive)) return;
                if (filterStatus === 'vinculado' && (!hasDoctor || isInactive)) return;

                // Definição de Badges e Layout
                let statusBadge = '';
                let doctorName = '';

                if (isInactive) {
                    statusBadge = `<span class="badge bg-inactive" title="Motivo: ${p.motivo_inativacao || 'Não informado'}"><i class="fas fa-ban"></i> Inativo</span>`;
                    doctorName = `<span style="color:#9ca3af; text-decoration: line-through;">${hasDoctor && doctors[p.doctor_id] ? doctors[p.doctor_id].nome : 'Sem médico'}</span>`;
                } else if (hasDoctor) {
                    statusBadge = `<span class="badge bg-linked"><i class="fas fa-check-circle"></i> Vinculado</span>`;
                    doctorName = doctors[p.doctor_id] ? doctors[p.doctor_id].nome : 'Médico Excluído';
                } else {
                    statusBadge = `<span class="badge bg-new"><i class="fas fa-exclamation-circle"></i> Novo</span>`;
                    doctorName = `<span style="color:#9ca3af; font-style:italic;">Aguardando vínculo...</span>`;
                }

                // Botões de Ação Dinâmicos
                let actionButtons = `
                    <button class="btn-icon btn-icon-link" title="Vincular Médico" onclick="openLinkModal('${p.id_firebase}', '${p.nome}', '${p.doctor_id || ''}')">
                        <i class="fas fa-link"></i>
                    </button>
                    <button class="btn-icon btn-icon-edit" title="Editar Nome" onclick="openEditModal('${p.id_firebase}')">
                        <i class="fas fa-edit"></i>
                    </button>
                `;

                if (!isInactive) {
                    actionButtons += `
                    <button class="btn-icon btn-icon-ban" title="Inativar Paciente" onclick="openInactivateModal('${p.id_firebase}', '${p.nome}')">
                        <i class="fas fa-ban"></i>
                    </button>`;
                }

                actionButtons += `
                    <button class="btn-icon btn-icon-danger" title="Excluir Permanentemente" onclick="deletePatient('${p.id_firebase}')">
                        <i class="fas fa-trash"></i>
                    </button>
                `;

                html += `<tr>
                    <td style="font-weight: bold; color: ${isInactive ? '#9ca3af' : '#1f2937'};">${p.nome}</td>
                    <td style="text-align: center;">${statusBadge}</td>
                    <td>${doctorName}</td>
                    <td><div class="actions-cell">${actionButtons}</div></td>
                </tr>`;
            });

            if (html === '') html = '<tr><td colspan="4" style="text-align:center; padding: 20px; color: #6b7280;">Nenhum paciente encontrado neste filtro.</td></tr>';
            tbody.innerHTML = html;
        }

        function filterTable() { renderTable(); }

        // ==========================================
        // 4. FUNÇÕES DE CRUD (CREATE, UPDATE, DELETE)
        // ==========================================
        function closeModals() {
            document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('active'));
        }

        // --- ADICIONAR / EDITAR NOME ---
        function openAddModal() {
            document.getElementById('editPatientId').value = '';
            document.getElementById('patientNameInput').value = '';
            document.getElementById('addEditModalTitle').innerText = 'Adicionar Novo Paciente';
            document.getElementById('addEditModal').classList.add('active');
        }

        function openEditModal(id) {
            const pat = patients[id];
            if(!pat) return;
            document.getElementById('editPatientId').value = id;
            document.getElementById('patientNameInput').value = pat.nome;
            document.getElementById('addEditModalTitle').innerText = 'Editar Nome do Paciente';
            document.getElementById('addEditModal').classList.add('active');
        }

        async function savePatient() {
            const idInput = document.getElementById('editPatientId').value;
            const nameInput = document.getElementById('patientNameInput').value.trim().toUpperCase();
            if (!nameInput) return alert('O nome é obrigatório!');

            if (idInput) {
                // MODO EDIÇÃO
                patients[idInput].nome = nameInput;
                try {
                    await fetch(API_BASE_URL + '/pacientes', {
                        method: 'POST', headers: API_HEADERS, body: JSON.stringify(patients[idInput])
                    });
                } catch(e) { alert("Erro ao editar."); }
            } else {
                // MODO CRIAÇÃO
                const newId = generatePatientId(nameInput);
                if (patients[newId]) return alert('Este paciente já existe na base de dados!');

                const newPat = {
                    id_firebase: newId,
                    nome: nameInput,
                    doctor_id: "",
                    status: "ativo",
                    data_criacao: new Date().toISOString()
                };
                
                try {
                    await fetch(API_BASE_URL + '/pacientes', {
                        method: 'POST', headers: API_HEADERS, body: JSON.stringify(newPat)
                    });
                    patients[newId] = newPat;
                } catch(e) { alert("Erro ao criar."); }
            }

            closeModals();
            renderTable();
        }

        // --- VINCULAR MÉDICO ---
        function openLinkModal(id, name, currentDoctorId) {
            document.getElementById('linkPatientId').value = id;
            document.getElementById('linkPatientName').innerText = name;
            document.getElementById('linkDoctorSelect').value = currentDoctorId;
            document.getElementById('linkModal').classList.add('active');
        }

        async function saveDoctorLink() {
            const patId = document.getElementById('linkPatientId').value;
            const docId = document.getElementById('linkDoctorSelect').value;
            if (!patId) return;

            patients[patId].doctor_id = docId; 
            if(patients[patId].status === 'inativo') patients[patId].status = 'ativo'; // Reativa se vincular médico

            try {
                await fetch(API_BASE_URL + '/pacientes', {
                    method: 'POST', headers: API_HEADERS, body: JSON.stringify(patients[patId])
                });
                closeModals();
                renderTable();
            } catch(e) { alert("Erro ao vincular médico."); }
        }

        // --- INATIVAR PACIENTE ---
        function openInactivateModal(id, name) {
            document.getElementById('inactivatePatientId').value = id;
            document.getElementById('inactivatePatientName').innerText = name;
            document.getElementById('inactivateReason').value = '';
            document.getElementById('inactivateModal').classList.add('active');
        }

        async function saveInactivation() {
            const patId = document.getElementById('inactivatePatientId').value;
            const reason = document.getElementById('inactivateReason').value.trim();
            if (!reason) return alert('O motivo da inativação é obrigatório!');

            patients[patId].status = 'inativo';
            patients[patId].motivo_inativacao = reason;

            try {
                await fetch(API_BASE_URL + '/pacientes', {
                    method: 'POST', headers: API_HEADERS, body: JSON.stringify(patients[patId])
                });
                closeModals();
                renderTable();
            } catch(e) { alert("Erro ao inativar paciente."); }
        }

        // --- EXCLUIR PERMANENTEMENTE ---
        async function deletePatient(id) {
            if(!confirm("CUIDADO: Tem certeza que deseja EXCLUIR PERMANENTEMENTE este paciente?\n\nSe ele aparecer na Unimed novamente, será recriado do zero.")) return;
            
            try {
                // Usa o padrão DELETE para a API
                await fetch(`${API_BASE_URL}/pacientes/${id}`, { method: 'DELETE', headers: API_HEADERS });
                delete patients[id];
                renderTable();
            } catch(e) { 
                alert('Erro ao tentar excluir do banco.'); 
            }
        }

        // Utilitário
        function normalizeData(apiData) {
            if (!apiData) return {}; const normalized = {};
            Object.entries(apiData).forEach(([key, val]) => {
                if (typeof val === 'string' && (val.startsWith('{') || val.startsWith('['))) { try { normalized[key] = JSON.parse(val); } catch(e) { normalized[key] = val; }
                } else { normalized[key] = val; }
            }); return normalized;
        }
    </script>
</body>
</html>
