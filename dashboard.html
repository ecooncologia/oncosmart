<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Dashboard - ECO Sistema</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    <link rel="apple-touch-icon" href="https://i.imgur.com/kpCeqqJ.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <!-- Estilos em styles.css: dashboard-grid, metric-card, chart-card, filters-container -->
</head>
<body>
    <div class="container">
        <div id="global-header" class="header"></div>
        <div id="global-nav"></div>

        <div class="filters-container">
            <div class="filter-group"><label>Data Início</label><input type="date" id="dashboardStartDate"></div>
            <div class="filter-group"><label>Data Fim</label><input type="date" id="dashboardEndDate"></div>
            <div class="filter-group"><label>Mês de Referência</label><input type="month" id="dashboardMonth"></div>
            <div class="filter-actions">
                <button class="btn btn-info" onclick="applyDashboardFilters()"><i class="fas fa-filter"></i> Filtrar</button>
                <button class="btn btn-warning" onclick="clearDashboardFilters()"><i class="fas fa-eraser"></i> Limpar</button>
            </div>
        </div>

        <div class="dashboard-grid">
            <div class="metric-card card-finance">
                <div class="metric-header"><span class="metric-title">Faturamento Aprovado</span><div class="metric-icon icon-finance"><i class="fas fa-dollar-sign"></i></div></div>
                <div class="metric-value text-finance" id="totalValue">R$ 0,00</div>
                <div class="metric-meta">Taxa de Conversão: <strong id="conversionRate">0%</strong></div>
            </div>
            <div class="metric-card">
                <div class="metric-header"><span class="metric-title">Orçamentos</span><div class="metric-icon icon-neutral"><i class="fas fa-file-invoice"></i></div></div>
                <div class="metric-value" id="totalBudgets">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-header"><span class="metric-title">Consultas</span><div class="metric-icon icon-neutral"><i class="fas fa-stethoscope"></i></div></div>
                <div class="metric-value" id="totalSales">0</div>
            </div>
            <div class="metric-card card-approved">
                <div class="metric-header"><span class="metric-title">Aprovados</span><div class="metric-icon icon-approved"><i class="fas fa-check"></i></div></div>
                <div class="metric-value value-success" id="approvedBudgets">0</div>
            </div>
            <div class="metric-card card-pending">
                <div class="metric-header"><span class="metric-title">Pendentes</span><div class="metric-icon icon-pending"><i class="fas fa-clock"></i></div></div>
                <div class="metric-value value-warning" id="pendingBudgets">0</div>
            </div>
            <div class="metric-card card-rejected">
                <div class="metric-header"><span class="metric-title">Reprovados</span><div class="metric-icon icon-rejected"><i class="fas fa-times"></i></div></div>
                <div class="metric-value value-danger" id="rejectedBudgets">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-header"><span class="metric-title">Cadastros</span><div class="metric-icon icon-dark"><i class="fas fa-database"></i></div></div>
                <div class="metric-sub"><i class="fas fa-briefcase-medical"></i> <strong id="totalProcedures">0</strong> Procedimentos<br><i class="fas fa-user-md"></i> <strong id="totalDoctors">0</strong> Médicos</div>
            </div>
        </div>

        <div class="charts-section">
            <div class="chart-card"><div class="chart-header">Orçamentos por Mês</div><div class="chart-body"><canvas id="monthlyChart"></canvas></div></div>
            <div class="chart-card"><div class="chart-header">Status</div><div class="chart-body"><canvas id="budgetStatusChart"></canvas></div></div>
            <div class="chart-card"><div class="chart-header">Evolução Consultas</div><div class="chart-body"><canvas id="salesChart"></canvas></div></div>
            <div class="chart-card"><div class="chart-header">Top Procedimentos</div><div class="chart-body"><ul id="procedureRanking" class="ranking-list"></ul></div></div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initGlobal('dashboard', 'Visão Geral');
            setTimeout(loadData, 500);
        });

        let procedures={}, budgets={}, sales={}, doctors={};
        let dashboardFilters = { startDate: '', endDate: '', month: '' };
        let chartInstances = { monthly: null, status: null, sales: null };

        async function loadData() {
            try {
                // AQUI ESTÁ A MUDANÇA: API_HEADERS globais inseridos em todas as chamadas!
                const [procRes, budRes, salRes, docRes] = await Promise.all([
                    fetch(`${API_BASE_URL}/procedimentos`, { headers: API_HEADERS }),
                    fetch(`${API_BASE_URL}/orcamentos`, { headers: API_HEADERS }),
                    fetch(`${API_BASE_URL}/vendas`, { headers: API_HEADERS }),
                    fetch(`${API_BASE_URL}/medicos`, { headers: API_HEADERS })
                ]);

                procedures = normalizeData(await procRes.json());
                budgets = normalizeData(await budRes.json());
                sales = normalizeData(await salRes.json());
                doctors = normalizeData(await docRes.json());

                updateDashboard();
            } catch (error) { 
                console.error('❌ Erro API:', error); 
            }
        }

        function normalizeData(apiData) {
            if (!apiData) return {};
            const normalized = {};
            Object.entries(apiData).forEach(([key, val]) => {
                if (typeof val === 'string' && (val.startsWith('{') || val.startsWith('['))) {
                    try { normalized[key] = JSON.parse(val); } catch(e) { normalized[key] = val; }
                } else { normalized[key] = val; }
            });
            return normalized;
        }

        function applyDashboardFilters() {
            dashboardFilters = { startDate: document.getElementById('dashboardStartDate').value, endDate: document.getElementById('dashboardEndDate').value, month: document.getElementById('dashboardMonth').value };
            updateDashboard();
        }
        function clearDashboardFilters() {
            document.getElementById('dashboardStartDate').value = ''; document.getElementById('dashboardEndDate').value = ''; document.getElementById('dashboardMonth').value = '';
            dashboardFilters = { startDate: '', endDate: '', month: '' }; updateDashboard();
        }

        function updateDashboard() {
            const filteredBudgets = filterByDate(budgets);
            const filteredSales = filterByDate(sales);
            
            const totalBudgets = Object.keys(filteredBudgets).length;
            const totalSalesCount = Object.keys(filteredSales).length;
            
            // --- CORREÇÃO DO CÁLCULO FINANCEIRO ---
            const totalValueApproved = Object.values(filteredBudgets).reduce((sum, b) => {
                const status = (b.status || '').toLowerCase();
                
                // Soma apenas se estiver Aprovado
                if (status === 'aprovado' || b.aprovado === true) {
                    let valStr = String(b.valor_final || b.valor || "0");

                    // 1. Remove R$ e espaços
                    valStr = valStr.replace('R$', '').trim();
                    
                    // 2. Se tiver vírgula, assume formato BR (1.000,00)
                    if (valStr.includes(',')) {
                        valStr = valStr.replace(/\./g, ''); // Remove ponto de milhar
                        valStr = valStr.replace(',', '.');  // Troca vírgula por ponto decimal
                    }
                    
                    let val = parseFloat(valStr);
                    return sum + (isNaN(val) ? 0 : val);
                }
                return sum;
            }, 0);

            const approvedCount = Object.values(filteredBudgets).filter(b => (b.status||'').toLowerCase() === 'aprovado' || b.aprovado === true).length;
            const rejectedCount = Object.values(filteredBudgets).filter(b => (b.status||'').toLowerCase() === 'reprovado').length;
            const pendingCount = Object.values(filteredBudgets).filter(b => (!b.status || (b.status||'').toLowerCase() === 'pendente') && !b.aprovado).length;
            const conversionRate = totalBudgets > 0 ? ((approvedCount / totalBudgets) * 100).toFixed(1) : 0;

            document.getElementById('totalBudgets').textContent = totalBudgets;
            // Exibe formatado bonitinho em BRL
            document.getElementById('totalValue').textContent = totalValueApproved.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            document.getElementById('totalSales').textContent = totalSalesCount;
            document.getElementById('approvedBudgets').textContent = approvedCount;
            document.getElementById('rejectedBudgets').textContent = rejectedCount;
            document.getElementById('pendingBudgets').textContent = pendingCount;
            document.getElementById('conversionRate').textContent = `${conversionRate}%`;
            document.getElementById('totalProcedures').textContent = Object.keys(procedures).length;
            document.getElementById('totalDoctors').textContent = Object.keys(doctors).length;

            updateCharts(filteredBudgets, filteredSales);
        }

        function filterByDate(dataObj) {
            if (!dataObj) return {};
            return Object.fromEntries(Object.entries(dataObj).filter(([id, item]) => {
                const rawDate = item.data || item.created_at || item.date || item.data_venda;
                if (!rawDate) return false;
                
                let itemDateStr = "";
                try {
                    if (rawDate.includes('T')) itemDateStr = rawDate.split('T')[0];
                    else if (rawDate.includes('/')) {
                        const [d, m, y] = rawDate.split('/');
                        itemDateStr = `${y}-${m}-${d}`;
                    }
                    else itemDateStr = rawDate;
                } catch(e) { return false; }

                if (dashboardFilters.startDate && itemDateStr < dashboardFilters.startDate) return false;
                if (dashboardFilters.endDate && itemDateStr > dashboardFilters.endDate) return false;
                if (dashboardFilters.month && !itemDateStr.startsWith(dashboardFilters.month)) return false;
                return true;
            }));
        }

        function updateCharts(filteredBudgets, filteredSales) {
            const chartOptions = { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 8, font: { size: 10 } } } } };
            
            // 1. Gráfico Mensal (Barras)
            const ctxMonthly = document.getElementById('monthlyChart').getContext('2d');
            const monthlyData = processMonthlyData(budgets); 
            if (chartInstances.monthly) chartInstances.monthly.destroy();
            chartInstances.monthly = new Chart(ctxMonthly, { type: 'bar', data: { labels: monthlyData.labels, datasets: [{ label: 'Orçamentos', data: monthlyData.data, backgroundColor: '#00855B', borderRadius: 4 }] }, options: chartOptions });

            // 2. Gráfico de Status (Rosca)
            const ctxStatus = document.getElementById('budgetStatusChart').getContext('2d');
            const approved = Object.values(filteredBudgets).filter(b => (b.status||'').toLowerCase() === 'aprovado').length;
            const rejected = Object.values(filteredBudgets).filter(b => (b.status||'').toLowerCase() === 'reprovado').length;
            const pending = Object.values(filteredBudgets).filter(b => (b.status||'').toLowerCase() === 'pendente').length;
            
            // Se não tiver dados, mostra um cinza vazio
            const statusData = (approved + rejected + pending) > 0 ? [approved, rejected, pending] : [1];
            const statusColors = (approved + rejected + pending) > 0 ? ['#38A169', '#E53E3E', '#DD6B20'] : ['#E2E8F0'];

            if (chartInstances.status) chartInstances.status.destroy();
            chartInstances.status = new Chart(ctxStatus, { type: 'doughnut', data: { labels: ['Aprovado', 'Reprovado', 'Pendente'], datasets: [{ data: statusData, backgroundColor: statusColors, borderWidth: 0 }] }, options: { ...chartOptions, cutout: '70%' } });

            // 3. Gráfico de Vendas/Consultas (Linha)
            const ctxSales = document.getElementById('salesChart').getContext('2d');
            const monthlySales = processMonthlyData(sales);
            if (chartInstances.sales) chartInstances.sales.destroy();
            chartInstances.sales = new Chart(ctxSales, { type: 'line', data: { labels: monthlySales.labels, datasets: [{ label: 'Consultas', data: monthlySales.data, borderColor: '#85BFCD', backgroundColor: 'rgba(133, 191, 205, 0.1)', fill: true, tension: 0.3 }] }, options: chartOptions });
            
            updateProcedureRanking(filteredBudgets);
        }

        function updateProcedureRanking(filteredBudgets) {
            const counts = {};
            Object.values(filteredBudgets).forEach(b => { 
                const procs = Array.isArray(b.procedimentos) ? b.procedimentos : (b.procedimento ? [b.procedimento] : []); 
                procs.forEach(p => { 
                    if(p && typeof p === 'string') counts[p] = (counts[p] || 0) + 1; 
                    else if (p && p.nome) counts[p.nome] = (counts[p.nome] || 0) + 1;
                }); 
            });
            const sorted = Object.entries(counts).sort((a,b) => b[1] - a[1]).slice(0, 5);
            const container = document.getElementById('procedureRanking');
            if (sorted.length === 0) { container.innerHTML = '<li style="text-align:center; color:#999; margin-top:20px;">Sem dados</li>'; return; }
            let html = '';
            sorted.forEach(([name, count], index) => { html += `<li class="ranking-item"><div><span class="rank-badge">${index+1}</span> ${name}</div><span class="rank-count" style="font-weight:bold; color:var(--primary)">${count}</span></li>`; });
            container.innerHTML = html;
        }

        function processMonthlyData(dataObj) {
            const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            const labels = [], data = [];
            const today = new Date();
            for (let i = 5; i >= 0; i--) {
                const d = new Date(today.getFullYear(), today.getMonth() - i, 1);
                const mIdx = d.getMonth(), yr = d.getFullYear();
                labels.push(`${months[mIdx]}`);
                const count = Object.values(dataObj).filter(item => { 
                    const rawDate = item.data || item.created_at || item.data_venda; 
                    if (!rawDate) return false; 
                    let itemDate;
                    if(rawDate.includes('/')) { const [day, month, year] = rawDate.split('/'); itemDate = new Date(year, month-1, day); }
                    else itemDate = new Date(rawDate);
                    return itemDate.getMonth() === mIdx && itemDate.getFullYear() === yr; 
                }).length;
                data.push(count);
            }
            return { labels, data };
        }
    </script>
</body>
</html>
