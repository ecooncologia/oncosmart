<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Artes - ECO Sistema</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/png" href="https://i.imgur.com/kpCeqqJ.png">
    <script>
        const versaoApp = Date.now();
        document.write('<link rel="stylesheet" href="styles.css?v=' + versaoApp + '">');
        document.write('<script src="global.js?v=' + versaoApp + '"><\/script>');
    </script>

    <style>
        body { background-color: #f3f4f6; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .container { width: 100%; padding: 20px; box-sizing: border-box; max-width: 1400px; margin: 0 auto; }
        
        .controls { background: white; padding: 15px 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .btn-primary { background: #00995D; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; gap: 8px; align-items: center; transition: 0.2s; }
        .btn-primary:hover { background: #007a4a; }
        .btn-danger { background: #dc2626; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-danger:hover { background: #b91c1c; }

        /* Galeria de Templates */
        .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .template-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer; border: 2px solid transparent; }
        .template-card:hover { transform: translateY(-5px); border-color: #00995D; box-shadow: 0 10px 15px rgba(0,153,93,0.1); }
        .template-img { width: 100%; height: 250px; object-fit: cover; background: #e5e7eb; }
        .template-info { padding: 15px; text-align: center; font-weight: bold; color: #374151; }
        .admin-delete-btn { width: 100%; background: #fee2e2; color: #dc2626; border: none; padding: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* Painel de Edição (Usuário) */
        .editor-container { display: none; background: white; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
        .editor-grid { display: grid; grid-template-columns: 350px 1fr; min-height: 500px; }
        .editor-sidebar { background: #f8fafc; padding: 20px; border-right: 1px solid #e5e7eb; }
        .editor-canvas-area { padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #e2e8f0; }
        
        canvas { max-width: 100%; max-height: 70vh; box-shadow: 0 10px 25px rgba(0,0,0,0.15); border-radius: 8px; }

        /* Painel de Criação (Admin) */
        .admin-panel { display: none; background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 12px; font-weight: bold; color: #4b5563; margin-bottom: 5px; text-transform: uppercase; }
        .form-control { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; box-sizing: border-box; }
        
        .field-box { background: #f0fdf4; border: 1px solid #bbf7d0; padding: 15px; border-radius: 8px; margin-bottom: 10px; position: relative; }
        .remove-field { position: absolute; top: 10px; right: 10px; color: #dc2626; cursor: pointer; background: none; border: none; font-size: 16px; }

        .toggle-container { display: flex; background: #e5e7eb; border-radius: 8px; overflow: hidden; margin-bottom: 20px; }
        .toggle-btn { flex: 1; padding: 10px; border: none; background: none; font-weight: bold; color: #6b7280; cursor: pointer; transition: 0.2s; }
        .toggle-btn.active { background: #00995D; color: white; }

        @media (max-width: 768px) {
            .editor-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="global-header" class="header"></div>
        <div id="global-nav"></div>

        <div class="controls">
            <h2 style="margin: 0; color: #1f2937; font-size: 20px;"><i class="fas fa-magic"></i> Gerador de Artes Oficiais</h2>
            <div>
                <button id="btnAdminNew" class="btn-primary" style="display: none;" onclick="toggleAdminPanel()"><i class="fas fa-plus"></i> Novo Template (Admin)</button>
                <button id="btnBackGallery" class="btn-primary" style="display: none; background: #6b7280;" onclick="showGallery()"><i class="fas fa-arrow-left"></i> Voltar à Galeria</button>
            </div>
        </div>

        <div id="galleryView" class="gallery">
            <p style="grid-column: 1/-1; text-align: center; color: #6b7280;"><i class="fas fa-spinner fa-spin"></i> Carregando templates...</p>
        </div>

        <div id="adminPanel" class="admin-panel">
            <h3 style="margin-top: 0; color: #00855B; border-bottom: 2px solid #e5e7eb; padding-bottom: 10px;">Configurar Novo Template</h3>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <div class="form-group">
                        <label class="form-label">Nome do Template</label>
                        <input type="text" id="tplName" class="form-control" placeholder="Ex: Boas Vindas Recepção">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Imagem de Fundo (PNG/JPG)</label>
                        <input type="file" id="tplImage" class="form-control" accept="image/*" onchange="previewAdminImage(event)">
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                        <h4 style="margin: 0;">Campos de Texto</h4>
                        <button class="btn-primary" style="padding: 5px 10px; font-size: 12px;" onclick="addAdminField()"><i class="fas fa-plus"></i> Adicionar Campo</button>
                    </div>
                    <div id="adminFieldsContainer" style="margin-top: 10px; max-height: 400px; overflow-y: auto; padding-right: 5px;"></div>

                    <button class="btn-primary" style="width: 100%; justify-content: center; margin-top: 20px; font-size: 16px;" onclick="saveTemplate()"><i class="fas fa-save"></i> Salvar Template no Banco</button>
                </div>
                
                <div style="background: #f9fafb; border: 1px dashed #cbd5e1; border-radius: 8px; padding: 10px; display: flex; flex-direction: column; align-items: center;">
                    <p style="font-size: 12px; color: #6b7280; text-align: center; margin-top: 0;">Preview da Imagem<br><b>Dica:</b> Digite os valores (X e Y) de onde o texto deve aparecer.</p>
                    <canvas id="adminCanvas" style="max-height: 450px; background: white; border: 1px solid #ccc;"></canvas>
                </div>
            </div>
        </div>

        <div id="editorView" class="editor-container">
            <div class="editor-grid">
                <div class="editor-sidebar">
                    <h3 id="useTplName" style="margin-top: 0; color: #1f2937;">-</h3>
                    
                    <div class="toggle-container">
                        <button id="btnMasc" class="toggle-btn active" onclick="setGender('M')"><i class="fas fa-mars"></i> Masculino</button>
                        <button id="btnFem" class="toggle-btn" onclick="setGender('F')"><i class="fas fa-venus"></i> Feminino</button>
                    </div>

                    <div id="userInputsContainer"></div>

                    <button class="btn-primary" style="width: 100%; justify-content: center; margin-top: 30px; font-size: 16px; padding: 15px;" onclick="downloadImage()"><i class="fas fa-download"></i> Baixar Imagem</button>
                </div>
                
                <div class="editor-canvas-area">
                    <canvas id="userCanvas"></canvas>
                </div>
            </div>
        </div>

    </div>

    <script>
        let templates = {};
        let isAdmin = false;
        let adminFieldsCount = 0;
        let adminBgImage = null;
        
        let currentTemplate = null;
        let currentGender = 'M';
        let userBgImage = null;

        async function startApp() {
            if (typeof initGlobal !== 'undefined') {
                initGlobal('marketing', 'Gerador de Artes');
                checkAdmin();
                await loadTemplates();
            } else {
                setTimeout(startApp, 100);
            }
        }

        document.addEventListener('DOMContentLoaded', startApp);

        function checkAdmin() {
            const userJson = localStorage.getItem('ecoUser');
            if (userJson) {
                const user = JSON.parse(userJson);
                const perms = user.permissoes || {};
                if (perms.admin === true) {
                    isAdmin = true;
                    document.getElementById('btnAdminNew').style.display = 'flex';
                }
            }
        }

        // ==========================================
        // MOTOR DE BANCO DE DADOS (CARREGAR E SALVAR)
        // ==========================================
        async function loadTemplates() {
            const gallery = document.getElementById('galleryView');
            try {
                const res = await fetch(`${API_BASE_URL}/templates_imagens`, { headers: API_HEADERS });
                if (res.ok) {
                    const rawData = await res.json();
                    templates = {};
                    Object.entries(rawData).forEach(([key, val]) => {
                        let parsed = val;
                        if (typeof val === 'string') { try { parsed = JSON.parse(val); } catch(e){} }
                        templates[key] = parsed;
                    });
                    renderGallery();
                } else {
                    gallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #6b7280;">Nenhum template cadastrado ainda.</p>';
                }
            } catch(e) {
                gallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #dc2626;">Erro ao carregar banco de dados.</p>';
            }
        }

        function renderGallery() {
            const gallery = document.getElementById('galleryView');
            gallery.innerHTML = '';
            
            const keys = Object.keys(templates);
            if (keys.length === 0) {
                gallery.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #6b7280;">Nenhum template cadastrado ainda.</p>';
                return;
            }

            keys.forEach(id => {
                const tpl = templates[id];
                const delBtn = isAdmin ? `<button class="admin-delete-btn" onclick="deleteTemplate(event, '${id}')"><i class="fas fa-trash"></i> Excluir Template</button>` : '';
                
                gallery.innerHTML += `
                    <div class="template-card" onclick="openEditor('${id}')">
                        <img src="${tpl.bg_image}" class="template-img">
                        <div class="template-info">${tpl.nome}</div>
                        ${delBtn}
                    </div>
                `;
            });
        }

        async function saveTemplate() {
            const nome = document.getElementById('tplName').value;
            if (!nome || !adminBgImage) return alert('Preencha o nome e selecione uma imagem de fundo!');

            const campos = [];
            for (let i = 1; i <= adminFieldsCount; i++) {
                const box = document.getElementById(`fbox_${i}`);
                if (box) {
                    campos.push({
                        label: document.getElementById(`fLabel_${i}`).value,
                        text_m: document.getElementById(`fMasc_${i}`).value,
                        text_f: document.getElementById(`fFem_${i}`).value,
                        x: parseInt(document.getElementById(`fX_${i}`).value) || 0,
                        y: parseInt(document.getElementById(`fY_${i}`).value) || 0,
                        color: document.getElementById(`fColor_${i}`).value,
                        size: parseInt(document.getElementById(`fSize_${i}`).value) || 40,
                        align: document.getElementById(`fAlign_${i}`).value
                    });
                }
            }

            const id = `tpl_${Date.now()}`;
            const payload = { id_firebase: id, nome: nome, bg_image: adminBgImage, campos: campos };

            try {
                await fetch(`${API_BASE_URL}/templates_imagens`, {
                    method: 'POST',
                    headers: API_HEADERS,
                    body: JSON.stringify(payload)
                });
                alert('Template salvo com sucesso!');
                showGallery();
                await loadTemplates();
            } catch(e) {
                alert('Erro ao salvar no banco.');
            }
        }

        async function deleteTemplate(event, id) {
            event.stopPropagation();
            if(!confirm('Certeza que deseja excluir este template?')) return;
            try {
                await fetch(`${API_BASE_URL}/templates_imagens/${id}`, { method: 'DELETE', headers: API_HEADERS });
                await loadTemplates();
            } catch(e) { alert('Erro ao excluir'); }
        }

        // ==========================================
        // PAINEL DE ADMINISTRAÇÃO (CRIAÇÃO)
        // ==========================================
        function toggleAdminPanel() {
            document.getElementById('galleryView').style.display = 'none';
            document.getElementById('editorView').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('btnAdminNew').style.display = 'none';
            document.getElementById('btnBackGallery').style.display = 'flex';
            
            document.getElementById('tplName').value = '';
            document.getElementById('tplImage').value = '';
            document.getElementById('adminFieldsContainer').innerHTML = '';
            adminFieldsCount = 0;
            adminBgImage = null;
            const canvas = document.getElementById('adminCanvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0,0,canvas.width,canvas.height);
        }

        function showGallery() {
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('editorView').style.display = 'none';
            document.getElementById('galleryView').style.display = 'grid';
            document.getElementById('btnBackGallery').style.display = 'none';
            if (isAdmin) document.getElementById('btnAdminNew').style.display = 'flex';
        }

        function previewAdminImage(event) {
            const file = event.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                adminBgImage = e.target.result; // Base64
                
                // Desenha no canvas para preview visual
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('adminCanvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    ctx.drawImage(img, 0, 0);
                }
                img.src = adminBgImage;
            }
            reader.readAsDataURL(file);
        }

        function addAdminField() {
            adminFieldsCount++;
            const id = adminFieldsCount;
            const container = document.getElementById('adminFieldsContainer');
            
            const html = `
            <div class="field-box" id="fbox_${id}">
                <button class="remove-field" onclick="document.getElementById('fbox_${id}').remove()"><i class="fas fa-times"></i></button>
                <div class="form-group">
                    <label class="form-label">Nome do Campo (Para o Usuário)</label>
                    <input type="text" id="fLabel_${id}" class="form-control" placeholder="Ex: Digite o Nome" value="Nome">
                </div>
                
                <div style="background: white; padding: 10px; border-radius: 6px; border: 1px solid #d1d5db; margin-bottom: 10px;">
                    <label class="form-label" style="color: #00855B;">Posição na Imagem (Em Pixels)</label>
                    <div style="display:flex; gap:10px;">
                        <input type="number" id="fX_${id}" class="form-control" placeholder="Eixo X (Horizontal)" value="500">
                        <input type="number" id="fY_${id}" class="form-control" placeholder="Eixo Y (Vertical)" value="500">
                    </div>
                </div>

                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <div style="flex:1;">
                        <label class="form-label">Tamanho da Fonte</label>
                        <input type="number" id="fSize_${id}" class="form-control" value="60">
                    </div>
                    <div style="flex:1;">
                        <label class="form-label">Cor</label>
                        <input type="color" id="fColor_${id}" class="form-control" value="#00855B" style="padding:0; height:38px;">
                    </div>
                    <div style="flex:1;">
                        <label class="form-label">Alinhamento</label>
                        <select id="fAlign_${id}" class="form-control">
                            <option value="center">Centralizado</option>
                            <option value="left">Esquerda</option>
                            <option value="right">Direita</option>
                        </select>
                    </div>
                </div>

                <label class="form-label" style="color: #0284c7;">Regra Masculina (Use {texto} para injetar)</label>
                <input type="text" id="fMasc_${id}" class="form-control" style="margin-bottom:10px;" placeholder="Ex: Bem-vindo, {texto}!" value="{texto}">

                <label class="form-label" style="color: #be185d;">Regra Feminina (Use {texto} para injetar)</label>
                <input type="text" id="fFem_${id}" class="form-control" placeholder="Ex: Bem-vinda, {texto}!" value="{texto}">
            </div>`;
            
            container.insertAdjacentHTML('beforeend', html);
        }

        // ==========================================
        // PAINEL DE USO (GERADOR FINAL)
        // ==========================================
        function openEditor(id) {
            currentTemplate = templates[id];
            if (!currentTemplate) return;

            document.getElementById('galleryView').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'none';
            document.getElementById('editorView').style.display = 'block';
            document.getElementById('btnAdminNew').style.display = 'none';
            document.getElementById('btnBackGallery').style.display = 'flex';

            document.getElementById('useTplName').innerText = currentTemplate.nome;
            currentGender = 'M';
            document.getElementById('btnMasc').classList.add('active');
            document.getElementById('btnFem').classList.remove('active');

            // Carrega imagem no canvas do usuário
            userBgImage = new Image();
            userBgImage.onload = function() {
                const canvas = document.getElementById('userCanvas');
                canvas.width = userBgImage.width;
                canvas.height = userBgImage.height;
                renderUserCanvas(); // Desenha a primeira vez
            }
            userBgImage.src = currentTemplate.bg_image;

            // Cria os inputs dinâmicos
            const container = document.getElementById('userInputsContainer');
            container.innerHTML = '';
            
            if (currentTemplate.campos) {
                currentTemplate.campos.forEach((campo, index) => {
                    container.innerHTML += `
                        <div class="form-group" style="margin-top: 15px;">
                            <label class="form-label">${campo.label}</label>
                            <input type="text" id="userInput_${index}" class="form-control" style="border: 2px solid #cbd5e1; font-size:16px;" placeholder="Digite aqui..." onkeyup="renderUserCanvas()">
                        </div>
                    `;
                });
            }
        }

        function setGender(g) {
            currentGender = g;
            if (g === 'M') {
                document.getElementById('btnMasc').classList.add('active');
                document.getElementById('btnFem').classList.remove('active');
            } else {
                document.getElementById('btnMasc').classList.remove('active');
                document.getElementById('btnFem').classList.add('active');
            }
            renderUserCanvas();
        }

        function renderUserCanvas() {
            if (!userBgImage || !currentTemplate) return;
            
            const canvas = document.getElementById('userCanvas');
            const ctx = canvas.getContext('2d');
            
            // Desenha o fundo limpo
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(userBgImage, 0, 0);

            // Escreve os textos
            if (currentTemplate.campos) {
                currentTemplate.campos.forEach((campo, index) => {
                    const inputEl = document.getElementById(`userInput_${index}`);
                    let textoDigitado = inputEl ? inputEl.value : "";
                    
                    // Aplica a regra de gênero
                    let regraAplicada = currentGender === 'M' ? campo.text_m : campo.text_f;
                    
                    // Injeta a palavra digitada no lugar do {texto}
                    let textoFinal = regraAplicada.replace('{texto}', textoDigitado);

                    // Configura a caneta
                    ctx.font = `bold ${campo.size}px "Segoe UI", Arial, sans-serif`;
                    ctx.fillStyle = campo.color;
                    ctx.textAlign = campo.align || "center";
                    ctx.textBaseline = "middle";

                    // Escreve na foto
                    ctx.fillText(textoFinal, campo.x, campo.y);
                });
            }
        }

        function downloadImage() {
            const canvas = document.getElementById('userCanvas');
            const link = document.createElement('a');
            link.download = `Arte_${currentTemplate.nome}_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }
    </script>
</body>
</html>
